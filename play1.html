<!DOCTYPE html>
<html dir="rtl" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Exo Style Player</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.13/shaka-player.compiled.js"></script>

  <meta name="referrer" content="no-referrer" />

  <style>
    :root{
      --bar-bg: rgba(0,0,0,.55);
    }

    *{
      box-sizing:border-box;
      -webkit-user-select:none !important;
      -moz-user-select:none !important;
      -ms-user-select:none !important;
      user-select:none !important;
      -webkit-touch-callout:none !important;
    }

    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      font-family:'Tajawal', sans-serif;
      -webkit-tap-highlight-color: transparent;
      overflow:hidden;
    }

    img, video, a {
      -webkit-user-drag:none !important;
      user-drag:none !important;
    }

    input, textarea {
      -webkit-user-select:text !important;
      user-select:text !important;
    }

    #player-root{
      position:fixed;
      inset:0;
      background:#000;
    }

    .player-wrapper{
      position:relative;
      width:100%;
      height:100%;
      background:#000;
      overflow:hidden;
    }

    video{
      width:100%;
      height:100%;
      background:#000;
      object-fit:fill;
      filter: contrast(1.06) saturate(1.12);
      transition: transform .25s ease;
    }

    video.fit-contain{ object-fit: contain !important; }
    video.fit-cover{ object-fit: cover !important; }
    video.fit-fill{ object-fit: fill !important; }

    #loading-spinner{
      position:absolute;
      z-index:50;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      width:48px;
      height:48px;
      border-radius:50%;
      border:4px solid rgba(255,255,255,.2);
      border-top-color:#fff;
      animation:spin 1s linear infinite;
      display:none;
      pointer-events:none;
    }

    @keyframes spin {
      to { transform:translate(-50%,-50%) rotate(360deg); }
    }

    #buffer-spinner{
      position:absolute;
      z-index:55;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      width:92px;
      height:92px;
      border-radius:50%;
      border:6px solid rgba(255,255,255,.25);
      border-top-color:#fff;
      animation:spin 1s linear infinite;
      display:none;
      pointer-events:none;
    }

    #error-overlay,
    #security-overlay{
      position:absolute;
      inset:0;
      z-index:999999;
      background:rgba(0,0,0,.92);
      color:#fff;
      display:none;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:20px;
      text-align:center;
      gap:12px;
    }

    #error-overlay i,
    #security-overlay i{
      width:48px;
      height:48px;
    }

    .retry-btn{
      border:none;
      background:#fff;
      color:#000;
      font-family:'Tajawal', sans-serif;
      font-weight:700;
      padding:10px 14px;
      border-radius:999px;
      cursor:pointer;
    }

    .retry-btn:active{
      transform:scale(.98);
    }

    .controls-overlay{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .top-bar{
      position:absolute;
      top:0;
      left:0;
      right:0;
      z-index:70;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px 14px;
      background:linear-gradient(to bottom, rgba(0,0,0,.78), rgba(0,0,0,0));
      opacity:0;
      transform:translateY(-6px);
      transition:.25s;
      pointer-events:auto;
    }

    .top-bar.visible{
      opacity:1;
      transform:translateY(0);
    }

    .top-left{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .top-btn{
      width:42px;
      height:42px;
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.22);
      backdrop-filter: blur(14px);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      box-shadow:0 10px 25px rgba(0,0,0,.28);
    }

    .top-btn i{
      color:#fff;
      width:20px;
      height:20px;
    }

    .stream-title{
      color:#fff;
      font-size:15px;
      font-weight:600;
      opacity:.95;
      max-width:65vw;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .center-transport{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      display:flex;
      align-items:center;
      gap:22px;
      pointer-events:auto;
      opacity:0;
      transition: opacity .2s;
    }

    .center-transport.visible{
      opacity:1;
    }

    .circle-btn.big{
      width:74px;
      height:74px;
      border-radius:999px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.22);
      backdrop-filter: blur(14px);
      color:#fff;
      box-shadow:0 16px 38px rgba(0,0,0,.35);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
    }

    .circle-btn.big:active{
      transform: scale(.94);
      filter:brightness(.95);
    }

    .circle-btn.big i{
      width:32px;
      height:32px;
      color:#fff;
    }

    .circle-btn.seek-btn{
      width:60px;
      height:60px;
      border-radius:999px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.22);
      backdrop-filter: blur(14px);
      color:#fff;
      box-shadow:0 16px 38px rgba(0,0,0,.35);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
    }

    .circle-btn.seek-btn:active{
      transform: scale(.94);
    }

    .circle-btn.seek-btn i{
      width:22px;
      height:22px;
      color:#fff;
    }

    .seek-badge{
      position:relative;
      width:60px;
      height:60px;
    }

    .seek-badge .num{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:13px;
      font-weight:800;
      letter-spacing:.2px;
      pointer-events:none;
      transform: translateY(1px);
    }

    .seek-badge i{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      opacity:.95;
    }

    .bottom-bar{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      pointer-events:auto;
      padding:12px 14px 14px 14px;
      background: linear-gradient(to top, rgba(0,0,0,.78), rgba(0,0,0,.18), rgba(0,0,0,0));
      opacity:0;
      transform: translateY(6px);
      transition: opacity .22s, transform .22s;
    }

    .bottom-bar.visible{
      opacity:1;
      transform: translateY(0);
    }

    .progress-row{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }

    .progress-wrapper{
      flex:1;
      height:5px;
      border-radius:999px;
      background: rgba(255,255,255,.22);
      overflow:hidden;
      cursor:pointer;
      position:relative;
    }

    .progress-played{
      position:absolute;
      left:0;
      top:0;
      bottom:0;
      width:0%;
      background:#fff;
    }

    .progress-thumb{
      position:absolute;
      top:50%;
      transform: translate(-50%,-50%);
      width:12px;
      height:12px;
      border-radius:50%;
      background:#fff;
      left:0%;
      opacity:1;
      pointer-events:none;
      box-shadow: 0 0 10px rgba(255,255,255,.35);
    }

    .controls-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .icons-row{
      display:flex;
      align-items:center;
      gap:12px;
      justify-content:flex-end;
      direction:ltr;
      min-width:0 !important;
      width:100%;
      flex-wrap:nowrap;
    }

    .time-text{
      color:#fff;
      font-size:15px;
      font-weight:500;
      letter-spacing:.3px;
      min-width:120px;
      text-align:left;
      direction:ltr;
      opacity:.92;
      margin-left:auto;
    }

    .icon-btn{
      width:40px;
      height:40px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 12px;
      padding: 0;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      color:#fff;
      opacity:.98;
      backdrop-filter: blur(10px);
      transition: .18s ease;
    }

    .icon-btn:hover{
      background: rgba(255,255,255,.14);
    }

    .icon-btn:active{
      transform: scale(.94);
    }

    .icon-btn i{
      width:20px;
      height:20px;
      color:#fff;
    }

    .live-task{
      display:none;
      align-items:center;
      gap:6px;
      padding:7px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.22);
      backdrop-filter: blur(14px);
      color:#fff;
      font-weight:800;
      font-size:13px;
      letter-spacing:.4px;
      min-width:110px;
      justify-content:center;
    }

    .live-task .dot{
      width:7px;
      height:7px;
      border-radius:50%;
      background:#ff2b2b;
      box-shadow:0 0 10px rgba(255,0,0,.9);
      animation:pulse 1.2s infinite;
    }

    @keyframes pulse{
      0%{ transform:scale(1); opacity:1;}
      50%{ transform:scale(1.4); opacity:.55;}
      100%{ transform:scale(1); opacity:1;}
    }

    .quality-menu{
      position:absolute;
      bottom:64px;
      left:12px;
      z-index:80;
      min-width:170px;
      background: rgba(0,0,0,.82);
      border:1px solid rgba(255,255,255,.14);
      border-radius:14px;
      padding:6px;
      display:none;
      pointer-events:auto;
      backdrop-filter: blur(6px);
      box-shadow:0 12px 32px rgba(0,0,0,.35);
    }

    .quality-menu.visible{
      display:block;
    }

    .quality-item{
      width:100%;
      border:none;
      background:transparent;
      color:rgba(255,255,255,.92);
      padding:10px 10px;
      text-align:right;
      font-family:'Tajawal', sans-serif;
      font-size:13px;
      border-radius:12px;
      cursor:pointer;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .quality-item:hover{
      background:rgba(255,255,255,.08);
    }

    .quality-item.active{
      background:rgba(255,255,255,.14);
    }

    .quality-badge{
      font-size:11px;
      color: rgba(255,255,255,.6);
    }

    #liveLabel{
      position:absolute;
      bottom:110px;
      left:50%;
      transform:translateX(-50%);
      color:#fff;
      font-size:14px;
      background:rgba(0,0,0,.55);
      padding:6px 10px;
      border-radius:999px;
      display:none;
      pointer-events:none;
      z-index:90;
      backdrop-filter: blur(10px);
    }

    .rotated{
      transform: rotate(90deg) scale(1.02);
      transform-origin:center center;
    }

    #pipBtn,
    #fullscreenBtn{
      display: none !important;
    }

    #castBtn,
    #rotateBtn{
      display:flex !important;
    }

    #audioLangBtn{ order: 1; }
    #ccBtn{ order: 2; }
    #qualityBtn{ order: 3; }
    #fitBtn{ order: 4; }
    #castBtn{ order: 5; }
    #rotateBtn{ order: 6; }
    #muteBtn{ order: 7; }

    @media (max-width: 600px){
      .stream-title{ max-width:50vw; }
      .center-transport{ gap:16px; }
      .circle-btn.big{
        width:68px;
        height:68px;
      }
      .circle-btn.seek-btn{
        width:54px;
        height:54px;
      }
      .seek-badge{
        width:54px;
        height:54px;
      }
      .icons-row{ gap:10px; }
      .icon-btn{
        width:38px;
        height:38px;
      }
    }


    /* BSR custom overlay text inside player */
    .bsr-brand-watermark{
      position:absolute;
      left:50%;
      bottom:74px;
      transform:translateX(-50%);
      z-index:65;
      pointer-events:none;
      font-family:'Tajawal', sans-serif;
      font-weight:800;
      font-size:clamp(13px, 2.1vw, 20px);
      line-height:1.6;
      color:#fff;
      text-align:center;
      padding:5px 12px;
      border-radius:999px;
      background:rgba(0,0,0,.18);
      text-shadow:0 2px 8px rgba(0,0,0,.95);
      white-space:nowrap;
    }
    .bsr-brand-watermark .brand{color:#ffd21a;font-weight:900;}

    /* BSR icons cleanup: keep useful icons and make fullscreen toggle visible */
    #fullscreenBtn{display:flex !important;}
    #audioLangBtn,
    #rotateBtn{display:none !important;}
    #castBtn,
    #pipBtn{display:flex !important;}

    #fullscreenBtn{order:1;}
    #pipBtn{order:2;}
    #castBtn{order:3;}
    #qualityBtn{order:4;}
    #ccBtn{order:5;}
    #muteBtn{order:6;}
    #fitBtn{order:7;}

    @media (max-width:600px){
      .bsr-brand-watermark{bottom:70px;font-size:13px;padding:4px 10px;max-width:94vw;}
      .icons-row{gap:8px;overflow-x:auto;scrollbar-width:none;}
      .icons-row::-webkit-scrollbar{display:none;}
    }

  </style>
</head>
<body>

<div id="player-root">
  <div class="player-wrapper" id="playerWrapper">
    <video id="video" playsinline autoplay></video>
    <div class="bsr-brand-watermark">شاهد جميع المباريات عبر موقع <span class="brand">البصري TV</span></div>

    <div class="top-bar" id="topBar">
      <div class="top-left">
        <button class="top-btn" id="backBtn" title="رجوع">
          <i data-feather="arrow-right"></i>
        </button>
        <div class="stream-title" id="streamTitle">A Live</div>
      </div>
      <div></div>
    </div>

    <div id="loading-spinner"></div>
    <div id="buffer-spinner"></div>

    <div id="error-overlay">
      <i data-feather="alert-triangle"></i>
      <h3 id="error-title">خطأ في المشغل</h3>
      <p id="error-message">تعذر تشغيل الفيديو.</p>
      <button class="retry-btn" id="retryBtn">إعادة التحميل</button>
    </div>

    <div id="security-overlay">
      <i data-feather="shield-off"></i>
      <h3>تم تفعيل الحماية</h3>
      <p id="security-message">تم منع أدوات الفحص أو النسخ.</p>
    </div>

    <div class="controls-overlay" id="controlsOverlay">
      <div class="center-transport" id="centerTransport">
        <div class="circle-btn seek-btn seek-badge" id="rewind5Btn" title="رجوع 5 ثواني">
          <i data-feather="rotate-ccw"></i>
          <div class="num">5</div>
        </div>

        <div class="circle-btn big" id="centerPlayPauseBtn" title="تشغيل/إيقاف">
          <i data-feather="pause"></i>
        </div>

        <div class="circle-btn seek-btn seek-badge" id="forward15Btn" title="تقديم 15 ثانية">
          <i data-feather="rotate-cw"></i>
          <div class="num">15</div>
        </div>
      </div>

      <div class="bottom-bar" id="bottomBar">
        <div class="progress-row">
          <div class="progress-wrapper" id="progressWrapper" tabindex="0">
            <div class="progress-played" id="progressPlayed"></div>
            <div class="progress-thumb" id="progressThumb"></div>
          </div>
        </div>

        <div class="controls-row">
          <div class="icons-row">
            <button class="icon-btn" id="muteBtn" title="الصوت" tabindex="0">
              <i data-feather="volume-x"></i>
            </button>

            <button class="icon-btn" id="fitBtn" title="تمدد / ملاءمة" tabindex="0">
              <i data-feather="maximize-2"></i>
            </button>

            <button class="icon-btn" id="qualityBtn" title="الجودة" tabindex="0">
              <i data-feather="settings"></i>
            </button>

            <button class="icon-btn" id="ccBtn" title="الترجمة" tabindex="0">
              <i data-feather="message-square"></i>
            </button>

            <button class="icon-btn" id="audioLangBtn" title="لغة الصوت" tabindex="0">
              <i data-feather="globe"></i>
            </button>

            <button class="icon-btn" id="castBtn" title="Cast" tabindex="0">
              <i data-feather="cast"></i>
            </button>

            <button class="icon-btn" id="pipBtn" title="PiP" tabindex="0">
              <i data-feather="airplay"></i>
            </button>

            <button class="icon-btn" id="fullscreenBtn" title="ملء الشاشة" tabindex="0">
              <i data-feather="maximize"></i>
            </button>

            <button class="icon-btn" id="rotateBtn" title="تدوير" tabindex="0">
              <i data-feather="rotate-cw"></i>
            </button>
          </div>

          <div class="live-task" id="liveTask">
            <span class="dot"></span>
            A LIVE
          </div>

          <div class="time-text" id="timeLabel">00:00 • 00:00</div>
        </div>
      </div>

      <div class="quality-menu" id="qualityMenu"></div>
      <div class="quality-menu" id="subsMenu"></div>
      <div class="quality-menu" id="audioMenu"></div>
      <div id="liveLabel"></div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const blockEvent = (e) => {
    e.preventDefault();
    e.stopPropagation();
    return false;
  };

  document.addEventListener('contextmenu', blockEvent, { passive: false });

  ['copy', 'cut', 'paste', 'selectstart', 'dragstart'].forEach(evt => {
    document.addEventListener(evt, blockEvent, { passive: false });
  });

  document.addEventListener('keydown', function (e) {
    const key = (e.key || '').toLowerCase();

    if (e.key === 'F12') return blockEvent(e);

    if (e.ctrlKey && ['u','s','c','v','x','a','p'].includes(key)) return blockEvent(e);

    if (e.ctrlKey && e.shiftKey && ['i','j','c','k'].includes(key)) return blockEvent(e);

    if (e.metaKey && ['u','s','c','v','x','a','p'].includes(key)) return blockEvent(e);
  }, { passive: false });

  try {
    if (window.top !== window.self) {
      window.top.location = window.self.location;
    }
  } catch (e) {}

})();
</script>

<script>
(function () {
  'use strict';

  let securityLocked = false;

  function lockSecurityScreen(msg) {
    if (securityLocked) return;
    securityLocked = true;

    const overlay = document.getElementById('security-overlay');
    const message = document.getElementById('security-message');

    if (message) message.textContent = msg || 'تم منع أدوات الفحص أو النسخ.';
    if (overlay) {
      overlay.style.display = 'flex';
      if (window.feather) feather.replace();
    }

    try {
      document.body.style.overflow = 'hidden';
    } catch (e) {}
  }

  function detectDevTools() {
    const widthGap = window.outerWidth - window.innerWidth > 160;
    const heightGap = window.outerHeight - window.innerHeight > 160;

    if (widthGap || heightGap) {
      lockSecurityScreen('تم كشف أدوات الفحص وتم إيقاف الواجهة.');
    }
  }

  setInterval(detectDevTools, 800);

  const element = new Image();
  Object.defineProperty(element, 'id', {
    get: function () {
      lockSecurityScreen('تم كشف أدوات الفحص وتم إيقاف الواجهة.');
      return '';
    }
  });

  setInterval(function () {
    console.log(element);
    console.clear();
  }, 1200);

  window.__lockSecurityScreen = lockSecurityScreen;
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  feather.replace();

  const video = document.getElementById('video');
  video.muted = false;
  video.volume = 1;

  document.body.addEventListener('click', ()=>{
    video.muted = false;
    video.volume = 1;
    video.play().catch(()=>{});
  }, { once:true });

  const playerWrapper = document.getElementById('playerWrapper');
  const loadingSpinner = document.getElementById('loading-spinner');
  const bufferSpinner  = document.getElementById('buffer-spinner');
  let bufferShowTimer  = null;

  const errorOverlay   = document.getElementById('error-overlay');
  const errorTitle     = document.getElementById('error-title');
  const errorMessage   = document.getElementById('error-message');
  const retryBtn       = document.getElementById('retryBtn');

  const bottomBar      = document.getElementById('bottomBar');
  const centerTransport= document.getElementById('centerTransport');
  const topBar         = document.getElementById("topBar");
  const backBtn        = document.getElementById("backBtn");
  const streamTitleEl  = document.getElementById("streamTitle");

  const rewind5Btn     = document.getElementById('rewind5Btn');
  const forward15Btn   = document.getElementById('forward15Btn');
  const centerPlayPauseBtn = document.getElementById('centerPlayPauseBtn');

  const progressWrapper= document.getElementById('progressWrapper');
  const progressPlayed = document.getElementById('progressPlayed');
  const progressThumb  = document.getElementById('progressThumb');
  const timeLabel      = document.getElementById('timeLabel');
  const liveTask       = document.getElementById("liveTask");

  const muteBtn        = document.getElementById('muteBtn');
  const fitBtn         = document.getElementById('fitBtn');
  const qualityBtn     = document.getElementById('qualityBtn');
  const qualityMenu    = document.getElementById('qualityMenu');

  const castBtn        = document.getElementById('castBtn');
  const pipBtn         = document.getElementById('pipBtn');
  const fullscreenBtn  = document.getElementById('fullscreenBtn');
  const rotateBtn      = document.getElementById('rotateBtn');

  const ccBtn          = document.getElementById('ccBtn');
  const audioLangBtn   = document.getElementById('audioLangBtn');
  const subsMenu       = document.getElementById('subsMenu');
  const audioMenu      = document.getElementById('audioMenu');
  const liveLabel      = document.getElementById('liveLabel');

  const DEFAULT_URL = "https://1s1.app55.com/out/v1/eee188845e9543699fd24e5a9890c6e2/index.mpd";
  const DEFAULT_CK  = "b253c726c24c7c94a3ddf9b1907e2c76:097963d6ad73c3d712a104981de0ed42";
  const DEFAULT_TITLE = "A Live";

  let player = null;
  let hideTimeout = null;
  let availableHeights = [];
  let manualHeight = null;
  let rotated = false;

  let chosenTextLang = null;
  let chosenAudioLang = null;

  const FIT_KEY = 'a_fit_mode';
  const FIT_MODES = [
    { key:'contain', label:'ملاءمة', cls:'fit-contain', icon:'minimize-2' },
    { key:'cover',   label:'قص',     cls:'fit-cover',   icon:'crop' },
    { key:'fill',    label:'تمدد',   cls:'fit-fill',    icon:'maximize-2' }
  ];

  let fitModeIndex = 2;

  function applyFitModeByIndex(idx){
    fitModeIndex = (idx + FIT_MODES.length) % FIT_MODES.length;
    const m = FIT_MODES[fitModeIndex];

    video.classList.remove('fit-contain','fit-cover','fit-fill');
    video.classList.add(m.cls);

    fitBtn.innerHTML = `<i data-feather="${m.icon}"></i>`;
    feather.replace();

    try { localStorage.setItem(FIT_KEY, m.key); } catch(e){}

    flashLabel(`العرض: ${m.label}`);
  }

  function loadFitMode(){
    let saved = null;
    try { saved = localStorage.getItem(FIT_KEY); } catch(e){}
    const idx = FIT_MODES.findIndex(x => x.key === saved);
    if (idx >= 0) fitModeIndex = idx;
    applyFitModeByIndex(fitModeIndex);
  }

  function cycleFitMode(){
    applyFitModeByIndex(fitModeIndex + 1);
  }

  function getParams(){
    const p = new URLSearchParams(window.location.search);

    let url = p.get('url');
    if (url) { try{ url = decodeURIComponent(url); }catch(e){} }
    url = url || DEFAULT_URL;

    let ck = p.get('ck');
    if (ck) { try{ ck = decodeURIComponent(ck); }catch(e){} }
    ck = ck || DEFAULT_CK;

    let title = p.get('title');
    if (title) { try{ title = decodeURIComponent(title); }catch(e){} }
    title = title || DEFAULT_TITLE;

    let sub = p.get('sub');
    let tlang = p.get('tlang');
    let alang = p.get('alang');

    let fit = p.get('fit');
    if (fit) { try{ fit = decodeURIComponent(fit); }catch(e){} }

    let ref = p.get('ref');
    if (ref) { try{ ref = decodeURIComponent(ref); }catch(e){} }

    let ua = p.get('ua');
    if (ua) { try{ ua = decodeURIComponent(ua); }catch(e){} }

    let auth = p.get('auth');
    if (auth) { try{ auth = decodeURIComponent(auth); }catch(e){} }

    let origin = p.get('origin');
    if (origin) { try{ origin = decodeURIComponent(origin); }catch(e){} }

    let cookie = p.get('cookie');
    if (cookie) { try{ cookie = decodeURIComponent(cookie); }catch(e){} }

    return { url, ck, title, sub, tlang, alang, fit, ref, ua, auth, origin, cookie };
  }

  function parseClearKey(ckString){
    if (!ckString) return null;

    const parts = ckString.split(':');
    if (parts.length !== 2) return null;

    const kid = parts[0].trim().toLowerCase().replace(/-/g,'');
    const key = parts[1].trim().toLowerCase().replace(/-/g,'');

    const hexRe = /^[0-9a-f]+$/;
    if (!hexRe.test(kid) || !hexRe.test(key)) return null;

    return { kid, key };
  }

  function showError(title, msg){
    loadingSpinner.style.display='none';
    bufferSpinner.style.display='none';
    clearTimeout(bufferShowTimer);

    errorTitle.textContent = title;
    errorMessage.textContent = msg;
    errorOverlay.style.display='flex';
    feather.replace();
  }

  function hideError(){
    errorOverlay.style.display='none';
  }

  function fmt(sec){
    if (!isFinite(sec) || sec < 0) return "00:00";

    const s = Math.floor(sec % 60).toString().padStart(2,'0');
    const m = Math.floor(sec / 60).toString().padStart(2,'0');
    const h = Math.floor(sec / 3600);

    if (h > 0) return h.toString().padStart(2,'0') + ":" + m + ":" + s;
    return m + ":" + s;
  }

  function flashLabel(text){
    liveLabel.textContent = text;
    liveLabel.style.display = 'block';
    setTimeout(()=> liveLabel.style.display='none', 1200);
  }

  function showControls(){
    bottomBar.classList.add('visible');
    centerTransport.classList.add('visible');
    topBar.classList.add('visible');

    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(()=>{
      bottomBar.classList.remove('visible');
      centerTransport.classList.remove('visible');
      topBar.classList.remove('visible');
      qualityMenu.classList.remove('visible');
      subsMenu.classList.remove('visible');
      audioMenu.classList.remove('visible');
    }, 2800);
  }

  function setCenterPlayIcon(){
    const icon = video.paused ? 'play' : 'pause';
    centerPlayPauseBtn.innerHTML = `<i data-feather="${icon}"></i>`;
    feather.replace();
  }

  function updateMuteIcon(){
    const icon = video.muted ? 'volume-x' : 'volume-2';
    muteBtn.innerHTML = `<i data-feather="${icon}"></i>`;
    feather.replace();
  }

  async function togglePlay(){
    if (video.paused) await video.play().catch(()=>{});
    else video.pause();
    setCenterPlayIcon();
  }

  function seekBy(d){
    const dur = video.duration || 0;
    if (!dur || !isFinite(dur)) return;
    video.currentTime = Math.max(0, (video.currentTime || 0) + d);
  }

  async function toggleFullscreen(){
    try{
      if (!document.fullscreenElement) {
        if (playerWrapper.requestFullscreen) await playerWrapper.requestFullscreen({ navigationUI: 'hide' });
        else if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
        flashLabel('تم تكبير الشاشة');
      } else {
        await document.exitFullscreen();
        flashLabel('تم تصغير الشاشة');
      }
    }catch(e){
      try{
        if (video.webkitEnterFullscreen && !document.fullscreenElement) video.webkitEnterFullscreen();
      }catch(_){ }
    }
    updateFullscreenIcon();
  }

  function updateFullscreenIcon(){
    const icon = document.fullscreenElement ? 'minimize' : 'maximize';
    fullscreenBtn.innerHTML = `<i data-feather="${icon}"></i>`;
    fullscreenBtn.title = document.fullscreenElement ? 'تصغير الشاشة' : 'تكبير الشاشة';
    feather.replace();
  }

  function updateProgress(){
    const cur = video.currentTime || 0;
    const dur = video.duration || 0;

    if (dur > 0 && isFinite(dur)){
      const ratio = (cur / dur) * 100;
      progressPlayed.style.width = ratio + "%";
      progressThumb.style.left = ratio + "%";
      timeLabel.textContent = `${fmt(cur)} • ${fmt(dur)}`;
    } else {
      progressPlayed.style.width = "100%";
      progressThumb.style.left = "100%";
    }
  }

  function buildQualityMenu(){
    const items = [
      { label:'تلقائي (Auto)', height:null, badge:'موصى به' },
      ...availableHeights.map(h => ({ label:`${h}p`, height:h, badge:'' }))
    ];

    qualityMenu.innerHTML = items.map(it=>{
      const active = (manualHeight === it.height) ? 'active' : '';
      const dataH = (it.height === null ? '' : it.height);
      return `
        <button class="quality-item ${active}" data-height="${dataH}">
          <span>${it.label}</span>
          <span class="quality-badge">${it.badge}</span>
        </button>
      `;
    }).join('');

    qualityMenu.querySelectorAll('.quality-item').forEach(btn=>{
      btn.addEventListener('click', async (e)=>{
        e.stopPropagation();
        const hAttr = btn.getAttribute('data-height');
        const h = (hAttr === '' ? null : parseInt(hAttr,10));
        await setQuality(h);
        qualityMenu.classList.remove('visible');
        showControls();
      });
    });
  }

  async function refreshAvailableQualities(){
    if (!player) return;

    const variants = player.getVariantTracks()
      .filter(t => t.type === 'variant' && t.height)
      .sort((a,b)=> b.height - a.height);

    const heights = [];
    for (const v of variants){
      if (!heights.includes(v.height)) heights.push(v.height);
    }

    availableHeights = heights;
    buildQualityMenu();
  }

  async function setQuality(heightOrNull){
    if (!player) return;

    if (heightOrNull === null){
      manualHeight = null;
      player.configure({ abr: { enabled:true }});
      buildQualityMenu();
      flashLabel('الجودة: تلقائي');
      return;
    }

    manualHeight = heightOrNull;
    player.configure({ abr: { enabled:false }});

    const tracks = player.getVariantTracks()
      .filter(t => t.height === heightOrNull)
      .sort((a,b)=> (b.bandwidth||0) - (a.bandwidth||0));

    if (tracks.length){
      player.selectVariantTrack(tracks[0], true);
      flashLabel(`الجودة: ${heightOrNull}p`);
    }

    buildQualityMenu();
  }

  function tryCast(){
    flashLabel('ميزة Cast ستتوفر هنا');
  }

  async function togglePiP(){
    try{
      if (!document.pictureInPictureEnabled) return flashLabel('PiP غير مدعوم');
      if (document.pictureInPictureElement) await document.exitPictureInPicture();
      else await video.requestPictureInPicture();
    }catch(e){
      flashLabel('تعذر تشغيل PiP');
    }
  }

  function toggleRotate(){
    rotated = !rotated;

    if(rotated){
      video.style.transform = 'rotate(90deg) scale(1.02)';
      video.style.transformOrigin = 'center center';
      flashLabel('تم تفعيل التدوير');
    }else{
      video.style.transform = '';
      video.style.transformOrigin = '';
      flashLabel('تم إيقاف التدوير');
    }
  }

  function applyLiveUI(){
    if (!player) return;

    const isLive = player.isLive();
    if (isLive){
      liveTask.style.display = "flex";
      timeLabel.style.display = "none";
      rewind5Btn.style.opacity = ".45";
      forward15Btn.style.opacity = ".45";
      progressWrapper.style.opacity = ".5";
    } else {
      liveTask.style.display = "none";
      timeLabel.style.display = "block";
      rewind5Btn.style.opacity = "1";
      forward15Btn.style.opacity = "1";
      progressWrapper.style.opacity = "1";
    }
  }

  function normalizeLang(l){ return (l || '').toLowerCase(); }
  function langLabel(l){ return (l || 'und').toUpperCase(); }

  function getTextTracks(){
    if (!player) return [];
    return (player.getTextTracks?.() || []).slice();
  }

  function getAudioLanguages(){
    if (!player) return [];

    const vars = player.getVariantTracks?.() || [];
    const langs = [];

    for (const v of vars){
      const L = normalizeLang(v.language);
      if (L && !langs.includes(L)) langs.push(L);
    }

    return langs.sort();
  }

  function buildSubsMenu(){
    const tracks = getTextTracks();
    const visible = player.isTextTrackVisible?.() || false;

    const items = [
      { label: 'إيقاف الترجمة', lang: null, active: !visible },
      ...tracks.map(t => ({
        label: `ترجمة: ${langLabel(t.language)}`,
        lang: normalizeLang(t.language),
        active: visible && normalizeLang(t.language) === normalizeLang(chosenTextLang || t.language)
      }))
    ];

    subsMenu.innerHTML = items.map(it => `
      <button class="quality-item ${it.active ? 'active' : ''}" data-lang="${it.lang ?? ''}">
        <span>${it.label}</span>
        <span class="quality-badge"></span>
      </button>
    `).join('');

    subsMenu.querySelectorAll('.quality-item').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const lang = btn.getAttribute('data-lang');

        if (!lang){
          player.setTextTrackVisibility(false);
          chosenTextLang = null;
          flashLabel('الترجمة: إيقاف');
        } else {
          const tracks2 = getTextTracks();
          const wanted = tracks2.find(t => normalizeLang(t.language) === normalizeLang(lang)) || tracks2[0];
          if (wanted){
            player.selectTextTrack(wanted);
            player.setTextTrackVisibility(true);
            chosenTextLang = wanted.language;
            flashLabel(`الترجمة: ${langLabel(wanted.language)}`);
          }
        }

        subsMenu.classList.remove('visible');
        showControls();
      });
    });
  }

  async function setAudioLanguage(alang){
    if (!player) return;

    chosenAudioLang = alang;
    player.configure({ preferredAudioLanguage: alang });

    const vars = player.getVariantTracks?.() || [];
    const cand = vars
      .filter(v => normalizeLang(v.language) === normalizeLang(alang))
      .sort((a,b)=> (b.bandwidth||0) - (a.bandwidth||0));

    if (cand.length){
      player.selectVariantTrack(cand[0], true);
      flashLabel(`الصوت: ${langLabel(alang)}`);
    } else {
      flashLabel('تعذر تغيير لغة الصوت');
    }
  }

  async function buildAudioMenu(){
    const langs = getAudioLanguages();

    const items = langs.map(l => ({
      lang: l,
      label: `صوت: ${langLabel(l)}`,
      active: normalizeLang(chosenAudioLang) === normalizeLang(l)
    }));

    if (!items.length){
      audioMenu.innerHTML = `
        <button class="quality-item active">
          <span>لا توجد لغات صوت متعددة</span>
          <span class="quality-badge"></span>
        </button>
      `;
      return;
    }

    audioMenu.innerHTML = items.map(it => `
      <button class="quality-item ${it.active ? 'active' : ''}" data-alang="${it.lang}">
        <span>${it.label}</span>
        <span class="quality-badge"></span>
      </button>
    `).join('');

    audioMenu.querySelectorAll('.quality-item').forEach(btn=>{
      btn.addEventListener('click', async (e)=>{
        e.stopPropagation();
        const alang = btn.getAttribute('data-alang');
        await setAudioLanguage(alang);
        audioMenu.classList.remove('visible');
        showControls();
      });
    });
  }

  playerWrapper.addEventListener('click', (e)=>{
    showControls();

    if (!qualityMenu.contains(e.target) && e.target !== qualityBtn) qualityMenu.classList.remove('visible');
    if (!subsMenu.contains(e.target) && e.target !== ccBtn) subsMenu.classList.remove('visible');
    if (!audioMenu.contains(e.target) && e.target !== audioLangBtn) audioMenu.classList.remove('visible');
  });

  playerWrapper.addEventListener('dblclick', (e)=>{
    e.preventDefault();
    e.stopPropagation();
  });

  rewind5Btn.addEventListener('click', (e)=>{
    e.stopPropagation();
    seekBy(-5);
    showControls();
  });

  forward15Btn.addEventListener('click', (e)=>{
    e.stopPropagation();
    seekBy(15);
    showControls();
  });

  centerPlayPauseBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    togglePlay();
    showControls();
  });

  progressWrapper.addEventListener('click', (e)=>{
    const dur = video.duration || 0;
    if (!(dur > 0 && isFinite(dur))) return;

    const rect = progressWrapper.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    video.currentTime = Math.max(0, Math.min(dur, ratio * dur));
    showControls();
  });

  qualityBtn.addEventListener('click', async (e)=>{
    e.stopPropagation();
    if (!player) return;

    if (!availableHeights.length) await refreshAvailableQualities();

    subsMenu.classList.remove('visible');
    audioMenu.classList.remove('visible');
    qualityMenu.classList.toggle('visible');
    showControls();
  });

  fitBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    cycleFitMode();
    showControls();
  });

  ccBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    if (!player) return;

    qualityMenu.classList.remove('visible');
    audioMenu.classList.remove('visible');
    buildSubsMenu();
    subsMenu.classList.toggle('visible');
    showControls();
  });

  audioLangBtn.addEventListener('click', async (e)=>{
    e.stopPropagation();
    if (!player) return;

    qualityMenu.classList.remove('visible');
    subsMenu.classList.remove('visible');
    await buildAudioMenu();
    audioMenu.classList.toggle('visible');
    showControls();
  });

  muteBtn.addEventListener('click', async (e)=>{
    e.stopPropagation();

    if (video.muted) {
      video.muted = false;
      if (video.paused) await video.play().catch(()=>{});
      flashLabel('الصوت: تشغيل');
    } else {
      video.muted = true;
      flashLabel('الصوت: كتم');
    }

    updateMuteIcon();
    showControls();
  });

  castBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    tryCast();
    showControls();
  });

  pipBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    togglePiP();
    showControls();
  });

  fullscreenBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    toggleFullscreen();
    showControls();
  });

  rotateBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    toggleRotate();
    showControls();
  });

  document.addEventListener('fullscreenchange', updateFullscreenIcon);

  video.addEventListener('timeupdate', updateProgress);
  video.addEventListener('loadedmetadata', updateProgress);
  video.addEventListener('play', ()=>{
    setCenterPlayIcon();
    showControls();
  });

  video.addEventListener('pause', ()=>{
    setCenterPlayIcon();
    showControls();
  });

  backBtn.addEventListener("click", (e)=>{
    e.stopPropagation();
    window.history.back();
  });

  let stallTimer = null;

  function armStallWatch(){
    clearTimeout(stallTimer);
    stallTimer = setTimeout(()=>{
      if (video.readyState < 3) {
        showError("توقف البث", "يبدو أن البث توقف أو الشبكة ضعيفة.");
      }
    }, 9000);
  }

  video.addEventListener('waiting', armStallWatch);
  video.addEventListener('stalled', armStallWatch);
  video.addEventListener('playing', ()=> clearTimeout(stallTimer));
  video.addEventListener('error', ()=> showError("خطأ في الفيديو", "تعذر تشغيل الفيديو."));

  retryBtn.addEventListener('click', async ()=>{
    hideError();
    await reloadStream();
  });

  async function reloadStream(){
    try{
      if (!player) return;

      const { url } = getParams();
      loadingSpinner.style.display='block';
      bufferSpinner.style.display='none';
      clearTimeout(bufferShowTimer);

      await player.unload();
      await player.load(url);

      loadingSpinner.style.display='none';
      bufferSpinner.style.display='none';

      await refreshAvailableQualities();
      await video.play().catch(()=>{});
      showControls();
      flashLabel('تمت إعادة التحميل');
      applyLiveUI();

      buildSubsMenu();
      await buildAudioMenu();

    }catch(e){
      showError("فشل إعادة التحميل", e?.message || String(e));
    }
  }

  async function initPlayer(){
    const { url, ck, title, ref, ua, auth, origin, cookie } = getParams();

    if (!url) {
      showError("لا يوجد رابط", "مرّر رابط الفيديو في ?url=");
      return;
    }

    streamTitleEl.textContent = title;
    loadingSpinner.style.display='block';

    shaka.polyfill.installAll();

    if (!shaka.Player.isBrowserSupported()){
      showError("المتصفح غير مدعوم", "المتصفح لا يدعم تشغيل هذا الفيديو.");
      return;
    }

    try{
      player = new shaka.Player(video);

      player.addEventListener('error', (event)=>{
        const msg = event.detail?.message || JSON.stringify(event.detail) || "غير معروف";
        showError("خطأ في Shaka", msg);
      });

      const networkingEngine = player.getNetworkingEngine();

      if (networkingEngine) {
        networkingEngine.registerRequestFilter((type, request) => {
          if (ua) request.headers['User-Agent'] = ua;
          if (ref) request.headers['Referer'] = ref;

          if (origin) {
            request.headers['Origin'] = origin;
          } else if (ref) {
            try {
              request.headers['Origin'] = new URL(ref).origin;
            } catch(e) {}
          }

          if (auth) request.headers['Authorization'] = auth;
          if (cookie) request.headers['Cookie'] = cookie;
        });
      }

      player.addEventListener('buffering', (e)=>{
        clearTimeout(bufferShowTimer);

        if (e.buffering) {
          bufferShowTimer = setTimeout(() => bufferSpinner.style.display = 'block', 300);
        } else {
          bufferSpinner.style.display = 'none';
        }
      });

      const ckParsed = parseClearKey(ck);
      if (ckParsed){
        player.configure({
          drm: { clearKeys: { [ckParsed.kid]: ckParsed.key } }
        });
      }

      await player.load(url);

      loadingSpinner.style.display='none';
      bufferSpinner.style.display='none';
      clearTimeout(bufferShowTimer);

      await refreshAvailableQualities();
      updateMuteIcon();
      await video.play().catch(()=>{});
      setCenterPlayIcon();
      showControls();
      applyLiveUI();

      const { sub, tlang, alang, fit } = getParams();

      if (fit){
        const idx = FIT_MODES.findIndex(x => x.key === (fit || '').toLowerCase());
        if (idx >= 0) applyFitModeByIndex(idx);
      }

      if (alang){
        await setAudioLanguage(alang);
      }

      if (tlang){
        chosenTextLang = tlang;
      }

      if (sub === '1'){
        const tracks = getTextTracks();
        const wanted = tracks.find(t => normalizeLang(t.language) === normalizeLang(chosenTextLang)) || tracks[0];

        if (wanted){
          player.selectTextTrack(wanted);
          player.setTextTrackVisibility(true);
          flashLabel(`الترجمة: ${langLabel(wanted.language)}`);
        }
      }

    }catch(err){
      showError("فشل التحميل", err?.message || String(err));
    }
  }

  updateMuteIcon();
  setCenterPlayIcon();
  updateFullscreenIcon();
  updateProgress();
  loadFitMode();
  showControls();
  initPlayer();
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  var btn = document.getElementById("backBtn");
  if (!btn) return;

  btn.onclick = function () {
    if (window.AndroidBridge && AndroidBridge.goBack) {
      AndroidBridge.goBack();
    } else {
      history.back();
    }
  };
});
</script>

</body>
