<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>BSR Hybrid Player</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.13/shaka-player.compiled.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{box-sizing:border-box;user-select:none}
html,body{margin:0;padding:0;width:100%;height:100%;background:#000;font-family:Tajawal,sans-serif;overflow:hidden}
#player-root,.player-wrapper{position:fixed;inset:0;background:#000}
video{width:100%;height:100%;background:#000;object-fit:fill;filter:contrast(1.06) saturate(1.12)}
video.fit-contain{object-fit:contain!important}
video.fit-cover{object-fit:cover!important}
video.fit-fill{object-fit:fill!important}

#loading,#buffer{
position:absolute;z-index:60;top:50%;left:50%;transform:translate(-50%,-50%);
border-radius:50%;border:5px solid rgba(255,255,255,.25);border-top-color:#fff;
animation:spin 1s linear infinite;display:none
}
#loading{width:52px;height:52px}
#buffer{width:86px;height:86px}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}

#error{
position:absolute;inset:0;z-index:999;background:rgba(0,0,0,.94);color:#fff;
display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px
}
#error button{border:0;background:#fff;color:#000;border-radius:999px;padding:11px 18px;font-weight:800;font-family:Tajawal}

.top{
position:absolute;top:0;left:0;right:0;z-index:80;padding:12px 14px;
background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);
display:flex;align-items:center;gap:10px;opacity:0;transition:.25s
}
.top.visible,.bottom.visible,.center.visible{opacity:1}
.btn,.icon{
border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.1);color:#fff;
border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer
}
.btn{width:42px;height:42px}
.icon{width:40px;height:40px}
.title{color:#fff;font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70vw}

.center{
position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
display:flex;gap:20px;align-items:center;opacity:0;transition:.25s;z-index:80
}
.circle{
border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.12);
color:#fff;border-radius:999px;display:flex;align-items:center;justify-content:center
}
.big{width:76px;height:76px}
.seek{width:58px;height:58px;position:relative}
.seek .num{position:absolute;font-size:13px;font-weight:900}

.bottom{
position:absolute;left:0;right:0;bottom:0;z-index:80;padding:12px 14px 15px;
background:linear-gradient(to top,rgba(0,0,0,.84),transparent);opacity:0;transition:.25s
}
.progress{height:5px;background:rgba(255,255,255,.25);border-radius:999px;position:relative;margin-bottom:12px;overflow:hidden}
.played{position:absolute;left:0;top:0;bottom:0;width:0;background:#fff}
.thumb{position:absolute;top:50%;left:0;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:#fff}
.row{display:flex;align-items:center;gap:10px}
.icons{display:flex;gap:10px;direction:ltr;flex:1}
.time{color:#fff;font-size:14px;direction:ltr;min-width:110px;text-align:left}
.live{display:none;color:#fff;font-weight:900;align-items:center;gap:7px}
.live span{width:8px;height:8px;background:red;border-radius:50%;box-shadow:0 0 10px red}
.menu{
position:absolute;bottom:68px;left:12px;z-index:100;min-width:180px;background:rgba(0,0,0,.88);
border:1px solid rgba(255,255,255,.16);border-radius:15px;padding:7px;display:none
}
.menu.visible{display:block}
.menu button{width:100%;border:0;background:transparent;color:#fff;padding:11px;border-radius:12px;text-align:right;font-family:Tajawal}
.menu button.active,.menu button:hover{background:rgba(255,255,255,.15)}
#toast{
position:absolute;bottom:112px;left:50%;transform:translateX(-50%);
background:rgba(0,0,0,.65);color:#fff;padding:7px 13px;border-radius:999px;display:none;z-index:100
}
</style>
</head>

<body>
<div id="player-root">
<div class="player-wrapper" id="wrap">

<video id="video" playsinline autoplay></video>

<div class="top" id="top">
  <button class="btn" id="back"><i data-feather="arrow-right"></i></button>
  <div class="title" id="title">BSR Player</div>
</div>

<div id="loading"></div>
<div id="buffer"></div>

<div id="error">
  <i data-feather="alert-triangle"></i>
  <h3 id="errTitle">خطأ في المشغل</h3>
  <p id="errMsg">تعذر تشغيل الرابط</p>
  <button id="retry">إعادة التحميل</button>
</div>

<div class="center" id="center">
  <button class="circle seek" id="rew"><i data-feather="rotate-ccw"></i><div class="num">5</div></button>
  <button class="circle big" id="play"><i data-feather="pause"></i></button>
  <button class="circle seek" id="fwd"><i data-feather="rotate-cw"></i><div class="num">15</div></button>
</div>

<div class="bottom" id="bottom">
  <div class="progress" id="progress">
    <div class="played" id="played"></div>
    <div class="thumb" id="thumb"></div>
  </div>

  <div class="row">
    <div class="icons">
      <button class="icon" id="mute"><i data-feather="volume-x"></i></button>
      <button class="icon" id="fit"><i data-feather="maximize-2"></i></button>
      <button class="icon" id="quality"><i data-feather="settings"></i></button>
      <button class="icon" id="rotate"><i data-feather="rotate-cw"></i></button>
    </div>
    <div class="live" id="live"><span></span>A LIVE</div>
    <div class="time" id="time">00:00 • 00:00</div>
  </div>
</div>

<div class="menu" id="qMenu"></div>
<div id="toast"></div>

</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  feather.replace();

  const $ = id => document.getElementById(id);
  const video = $("video");
  const topBar = $("top");
  const bottom = $("bottom");
  const center = $("center");
  const loading = $("loading");
  const buffer = $("buffer");
  const errorBox = $("error");
  const errTitle = $("errTitle");
  const errMsg = $("errMsg");
  const titleEl = $("title");
  const playBtn = $("play");
  const muteBtn = $("mute");
  const fitBtn = $("fit");
  const rotateBtn = $("rotate");
  const qualityBtn = $("quality");
  const qMenu = $("qMenu");
  const progress = $("progress");
  const played = $("played");
  const thumb = $("thumb");
  const time = $("time");
  const live = $("live");
  const toast = $("toast");

  const WORKER = "https://ali.albesriali8.workers.dev/";

  let hls = null;
  let shakaPlayer = null;
  let hideTimer = null;
  let fitIndex = 0;
  let rotated = false;
  let currentEngine = "";

  function getParams(){
    const p = new URLSearchParams(location.search);

    const get = k => {
      let v = p.get(k) || "";
      try { v = decodeURIComponent(v); } catch(e) {}
      return v;
    };

    return {
      url: get("url"),
      title: get("title") || "BSR Player",
      ck: get("ck"),
      ref: get("ref"),
      origin: get("origin"),
      ua: get("ua") || "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/133.0.0.0 Safari/537.36",
      auth: get("auth"),
      cookie: get("cookie"),
      forceWorker: get("worker") === "1"
    };
  }

  function isMpd(u){
    return (u || "").toLowerCase().includes(".mpd") || (u || "").toLowerCase().includes("manifest.mpd");
  }

  function isHls(u){
    const x = (u || "").toLowerCase();
    return x.includes(".m3u8") || x.includes(".png") || x.includes("#hls") || x.includes(".json");
  }

  function proxyUrl(u, ref, origin, ua){
    if(!u) return u;
    if(u.startsWith(WORKER)) return u;

    const p = new URLSearchParams();
    p.set("url", u.replace("#hls",""));
    p.set("ua", ua);

    try{
      const site = new URL(u.replace("#hls",""));
      p.set("ref", ref || site.origin + "/");
      p.set("origin", origin || site.origin);
    }catch(e){
      if(ref) p.set("ref", ref);
      if(origin) p.set("origin", origin);
    }

    return WORKER + "?" + p.toString();
  }

  function shouldUseWorker(params){
    const u = params.url.toLowerCase();

    if(params.forceWorker) return true;

    if(isMpd(params.url)) return false;

    if(u.startsWith("http://")) return true;
    if(isHls(params.url)) return true;

    return false;
  }

  function finalUrl(params){
    if(shouldUseWorker(params)){
      return proxyUrl(params.url, params.ref, params.origin, params.ua);
    }
    return params.url;
  }

  function parseClearKey(ck){
    if(!ck || !ck.includes(":")) return null;

    const [kid, key] = ck.split(":");
    const cleanKid = kid.trim().replace(/-/g,"").toLowerCase();
    const cleanKey = key.trim().replace(/-/g,"").toLowerCase();

    if(!/^[0-9a-f]+$/.test(cleanKid)) return null;
    if(!/^[0-9a-f]+$/.test(cleanKey)) return null;

    return { kid: cleanKid, key: cleanKey };
  }

  function showControls(){
    topBar.classList.add("visible");
    bottom.classList.add("visible");
    center.classList.add("visible");

    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      topBar.classList.remove("visible");
      bottom.classList.remove("visible");
      center.classList.remove("visible");
      qMenu.classList.remove("visible");
    }, 2800);
  }

  function showError(title, msg){
    loading.style.display = "none";
    buffer.style.display = "none";
    errTitle.textContent = title;
    errMsg.textContent = msg;
    errorBox.style.display = "flex";
    feather.replace();
  }

  function hideError(){
    errorBox.style.display = "none";
  }

  function flash(text){
    toast.textContent = text;
    toast.style.display = "block";
    setTimeout(() => toast.style.display = "none", 1300);
  }

  function setPlayIcon(){
    playBtn.innerHTML = `<i data-feather="${video.paused ? "play" : "pause"}"></i>`;
    feather.replace();
  }

  function setMuteIcon(){
    muteBtn.innerHTML = `<i data-feather="${video.muted ? "volume-x" : "volume-2"}"></i>`;
    feather.replace();
  }

  function fmt(s){
    if(!isFinite(s) || s < 0) return "00:00";

    const sec = Math.floor(s % 60).toString().padStart(2,"0");
    const min = Math.floor((s / 60) % 60).toString().padStart(2,"0");
    const hr = Math.floor(s / 3600);

    return hr > 0 ? `${hr}:${min}:${sec}` : `${min}:${sec}`;
  }

  function updateProgress(){
    const d = video.duration || 0;
    const c = video.currentTime || 0;

    if(d > 0 && isFinite(d)){
      const r = (c / d) * 100;
      played.style.width = r + "%";
      thumb.style.left = r + "%";
      time.style.display = "block";
      live.style.display = "none";
      time.textContent = `${fmt(c)} • ${fmt(d)}`;
    } else {
      played.style.width = "100%";
      thumb.style.left = "100%";
      time.style.display = "none";
      live.style.display = "flex";
    }
  }

  async function destroyPlayers(){
    if(hls){
      hls.destroy();
      hls = null;
    }

    if(shakaPlayer){
      await shakaPlayer.destroy().catch(()=>{});
      shakaPlayer = null;
    }

    video.removeAttribute("src");
    video.load();
    currentEngine = "";
  }

  async function playStream(){
    const params = getParams();

    if(!params.url){
      showError("لا يوجد رابط", "افتح المشغل هكذا: player.html?url=رابط_القناة");
      return;
    }

    titleEl.textContent = params.title;
    hideError();
    loading.style.display = "block";
    buffer.style.display = "none";

    const src = finalUrl(params);

    try{
      await destroyPlayers();

      if(isMpd(params.url)){
        currentEngine = "shaka";

        shaka.polyfill.installAll();

        if(!shaka.Player.isBrowserSupported()){
          showError("غير مدعوم", "المتصفح لا يدعم MPD / DASH");
          return;
        }

        shakaPlayer = new shaka.Player(video);

        shakaPlayer.addEventListener("error", event => {
          const msg = event.detail?.message || JSON.stringify(event.detail) || "تعذر تشغيل MPD";
          showError("خطأ MPD", msg);
        });

        const net = shakaPlayer.getNetworkingEngine();
        if(net){
          net.registerRequestFilter((type, request) => {
            if(params.ua) request.headers["User-Agent"] = params.ua;
            if(params.ref) request.headers["Referer"] = params.ref;

            if(params.origin){
              request.headers["Origin"] = params.origin;
            } else if(params.ref){
              try { request.headers["Origin"] = new URL(params.ref).origin; } catch(e){}
            }

            if(params.auth) request.headers["Authorization"] = params.auth;
            if(params.cookie) request.headers["Cookie"] = params.cookie;
          });
        }

        const ck = parseClearKey(params.ck);
        if(ck){
          shakaPlayer.configure({
            drm: {
              clearKeys: {
                [ck.kid]: ck.key
              }
            }
          });
        }

        shakaPlayer.addEventListener("buffering", e => {
          buffer.style.display = e.buffering ? "block" : "none";
        });

        await shakaPlayer.load(src);

        loading.style.display = "none";
        await video.play().catch(()=>{});
        setPlayIcon();
        setMuteIcon();
        buildShakaQuality();
        showControls();

      } else {
        currentEngine = "hls";

        if(Hls.isSupported()){
          hls = new Hls({
            enableWorker: true,
            lowLatencyMode: false,
            maxBufferLength: 30,
            backBufferLength: 90,
            liveSyncDuration: 4
          });

          hls.loadSource(src);
          hls.attachMedia(video);

          hls.on(Hls.Events.MANIFEST_PARSED, async () => {
            loading.style.display = "none";
            buildHlsQuality();
            await video.play().catch(()=>{});
            setPlayIcon();
            setMuteIcon();
            showControls();
          });

          hls.on(Hls.Events.ERROR, (event, data) => {
            if(data.fatal){
              if(data.type === Hls.ErrorTypes.NETWORK_ERROR){
                hls.startLoad();
                flash("إعادة الاتصال");
              } else if(data.type === Hls.ErrorTypes.MEDIA_ERROR){
                hls.recoverMediaError();
                flash("إصلاح الفيديو");
              } else {
                showError("خطأ HLS", data.details || "تعذر تشغيل الرابط");
              }
            }
          });

        } else if(video.canPlayType("application/vnd.apple.mpegurl")){
          video.src = src;
          video.addEventListener("loadedmetadata", async () => {
            loading.style.display = "none";
            await video.play().catch(()=>{});
            setPlayIcon();
            showControls();
          }, { once:true });

        } else {
          video.src = src;
          loading.style.display = "none";
          await video.play().catch(()=>{});
          setPlayIcon();
          showControls();
        }
      }

    } catch(e){
      showError("فشل التشغيل", e.message || String(e));
    }
  }

  function buildHlsQuality(){
    if(!hls){
      qMenu.innerHTML = "";
      return;
    }

    let html = `<button class="active" data-level="-1">تلقائي Auto</button>`;

    (hls.levels || []).forEach((level, i) => {
      html += `<button data-level="${i}">${level.height ? level.height + "p" : "Quality " + (i+1)}</button>`;
    });

    qMenu.innerHTML = html;

    qMenu.querySelectorAll("button").forEach(btn => {
      btn.onclick = e => {
        e.stopPropagation();

        hls.currentLevel = parseInt(btn.dataset.level, 10);

        qMenu.querySelectorAll("button").forEach(x => x.classList.remove("active"));
        btn.classList.add("active");

        flash("الجودة: " + btn.textContent);
        qMenu.classList.remove("visible");
        showControls();
      };
    });
  }

  function buildShakaQuality(){
    if(!shakaPlayer){
      qMenu.innerHTML = "";
      return;
    }

    const tracks = shakaPlayer.getVariantTracks()
      .filter(t => t.height)
      .sort((a,b) => (b.height || 0) - (a.height || 0));

    const seen = new Set();
    const unique = [];

    tracks.forEach(t => {
      if(!seen.has(t.height)){
        seen.add(t.height);
        unique.push(t);
      }
    });

    let html = `<button class="active" data-id="auto">تلقائي Auto</button>`;

    unique.forEach(t => {
      html += `<button data-id="${t.id}">${t.height}p</button>`;
    });

    qMenu.innerHTML = html;

    qMenu.querySelectorAll("button").forEach(btn => {
      btn.onclick = e => {
        e.stopPropagation();

        if(btn.dataset.id === "auto"){
          shakaPlayer.configure({ abr: { enabled:true } });
        } else {
          shakaPlayer.configure({ abr: { enabled:false } });

          const tr = tracks.find(x => String(x.id) === btn.dataset.id);
          if(tr) shakaPlayer.selectVariantTrack(tr, true);
        }

        qMenu.querySelectorAll("button").forEach(x => x.classList.remove("active"));
        btn.classList.add("active");

        flash("الجودة: " + btn.textContent);
        qMenu.classList.remove("visible");
        showControls();
      };
    });
  }

  playBtn.onclick = async e => {
    e.stopPropagation();

    if(video.paused) await video.play().catch(()=>{});
    else video.pause();

    setPlayIcon();
    showControls();
  };

  $("rew").onclick = e => {
    e.stopPropagation();

    if(isFinite(video.duration)){
      video.currentTime = Math.max(0, video.currentTime - 5);
    }

    showControls();
  };

  $("fwd").onclick = e => {
    e.stopPropagation();

    if(isFinite(video.duration)){
      video.currentTime = Math.min(video.duration, video.currentTime + 15);
    }

    showControls();
  };

  muteBtn.onclick = e => {
    e.stopPropagation();

    video.muted = !video.muted;
    setMuteIcon();
    flash(video.muted ? "الصوت: كتم" : "الصوت: تشغيل");
    showControls();
  };

  fitBtn.onclick = e => {
    e.stopPropagation();

    const modes = ["fit-fill","fit-contain","fit-cover"];
    const names = ["تمدد","ملاءمة","قص"];

    video.classList.remove(...modes);
    fitIndex = (fitIndex + 1) % modes.length;
    video.classList.add(modes[fitIndex]);

    flash("العرض: " + names[fitIndex]);
    showControls();
  };

  rotateBtn.onclick = e => {
    e.stopPropagation();

    rotated = !rotated;
    video.style.transform = rotated ? "rotate(90deg) scale(1.02)" : "";
    flash(rotated ? "تم تفعيل التدوير" : "تم إيقاف التدوير");
    showControls();
  };

  qualityBtn.onclick = e => {
    e.stopPropagation();

    if(currentEngine === "hls") buildHlsQuality();
    if(currentEngine === "shaka") buildShakaQuality();

    qMenu.classList.toggle("visible");
    showControls();
  };

  progress.onclick = e => {
    const d = video.duration || 0;
    if(!(d > 0 && isFinite(d))) return;

    const rect = progress.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;

    video.currentTime = Math.max(0, Math.min(d, ratio * d));
    showControls();
  };

  $("retry").onclick = playStream;
  $("back").onclick = () => history.back();

  video.addEventListener("waiting", () => buffer.style.display = "block");
  video.addEventListener("playing", () => buffer.style.display = "none");
  video.addEventListener("timeupdate", updateProgress);
  video.addEventListener("loadedmetadata", updateProgress);
  video.addEventListener("play", setPlayIcon);
  video.addEventListener("pause", setPlayIcon);

  $("wrap").onclick = showControls;

  video.muted = false;
  video.volume = 1;

  setMuteIcon();
  setPlayIcon();
  showControls();
  playStream();
});
</script>
</body>
</html>
