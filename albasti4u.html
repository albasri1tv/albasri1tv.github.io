    <script>
    (function(){
        'use strict';
        const ALLOWED_HOSTS = ['albasri-tv.github.io'];
        const ALLOWED_PATHS = ['/albasti4u.html', '/albasti4u', '/albasri_series_domain_protected.html'];
        function blockPage(){
            document.addEventListener('DOMContentLoaded', function(){
                document.body.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f0f13;color:#fff;font-family:Cairo,Arial;text-align:center;padding:20px;direction:rtl"><div style="max-width:420px;background:#1c1c21;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,.4)"><div style="font-size:46px;color:#ff0040;margin-bottom:10px">⛔</div><h2 style="margin:0 0 10px;color:#ff0040">تشغيل غير مصرح</h2><p style="margin:0;color:#ccc;line-height:1.8">هذا الكود محمي ويعمل فقط على موقع البصري الرسمي.</p></div></div>';
            });
            throw new Error('Protected page: unauthorized domain');
        }
        const host = location.hostname.toLowerCase();
        const path = location.pathname;
        const isLocal = host === 'localhost' || host === '127.0.0.1' || location.protocol === 'file:';
        const allowedHost = ALLOWED_HOSTS.includes(host);
        const allowedPath = ALLOWED_PATHS.includes(path);
        if (!isLocal && (!allowedHost || !allowedPath)) blockPage();
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('selectstart', e => { if (!['INPUT','TEXTAREA'].includes(e.target.tagName)) e.preventDefault(); });
        document.addEventListener('dragstart', e => e.preventDefault());
        document.addEventListener('keydown', function(e){
            const k = String(e.key || '').toLowerCase();
            if (e.key === 'F12' || (e.ctrlKey && ['u','s','p','c','x'].includes(k)) || (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(k))) {
                e.preventDefault(); e.stopPropagation(); return false;
            }
        }, true);
    })();
    </script>

    }

    function normalizeText(text) {
        return String(text || '')

            .replace(/[أإآٱ]/g, 'ا')

            .replace(/ة/g, 'ه')

        series_33: "https://up6.cc/2026/04/177578091128861.png", movies_29: "https://up6.cc/2026/04/177578141485251.png",
        movies_30: "https://up6.cc/2026/04/177578141491472.png", movies_31: "https://up6.cc/2026/04/177578141497723.png",
        movies_32: "https://up6.cc/2026/04/17757814150724.png", movies_33: "https://up6.cc/2026/04/177578152800671.png"
    };

    function makeCard(item, type, imageOverride) {
        const card = document.createElement('div');
        card.className = 'custom-card movie-item';
        card.dataset.title = item.title || item.name || '';
        const image = imageOverride || item.image || '';
        const icon = type === 'movies' ? 'fa-play' : 'fa-list-ul';
        card.innerHTML = `<div class="card-img" style="background-image: url('${htmlEscape(image)}')"></div><div class="card-play"><i class="fas ${icon}"></i></div><div class="card-title">${htmlEscape(item.title || item.name || 'بدون عنوان')}</div>`;
        card.addEventListener('click', () => handleSelection(item.url, image, type, item.title || item.name || 'بدون عنوان'));
        return card;
    }

    function initLauncher() {
        const cats = [
            {id:'29', type:'series', name:'مسلسلات عربية', img:sectionImages.series_29},
            {id:'32', type:'series', name:'مسلسلات تركية', img:sectionImages.series_32},
            {id:'30', type:'series', name:'مسلسلات أجنبية', img:sectionImages.series_30},
            {id:'31', type:'series', name:'مسلسلات هندية', img:sectionImages.series_31},
            {id:'33', type:'series', name:'مسلسلات آسيوية', img:sectionImages.series_33},
            {id:'29', type:'movies', name:'أفلام عربية', img:sectionImages.movies_29},
            {id:'30', type:'movies', name:'أفلام أجنبية', img:sectionImages.movies_30},
            {id:'32', type:'movies', name:'أفلام تركية', img:sectionImages.movies_32},
            {id:'31', type:'movies', name:'أفلام هندية', img:sectionImages.movies_31},
            {id:'33', type:'movies', name:'أفلام آسيوية', img:sectionImages.movies_33}
        ];
        const grid = $('home-view');
        if (!grid) return;
        grid.innerHTML = '';
        cats.forEach(c => {
            const card = document.createElement('div');
            card.className = 'custom-card';
            card.innerHTML = `<div class="card-img" style="background-image: url('${htmlEscape(c.img)}')"></div><div class="card-play"><i class="fas fa-folder-open"></i></div><div class="card-title">${htmlEscape(c.name)}</div>`;
            card.addEventListener('click', () => loadData(c.type, c.id, 1, c.name));
            grid.appendChild(card);
        });
        if (!history.state) history.replaceState({view: 'home'}, '');
    }

    function showHome(push = true) {
        $('home-view').style.display = 'grid';
        $('section-view').style.display = 'none';
        $('eps-view').style.display = 'none';
        $('loader').style.display = 'none';
        $('pagination-box').innerHTML = '';
        current.view = 'home';
        closeSidebarOnly();
        if (push) history.pushState({view: 'home'}, '');
    }

    async function loadData(type, sec, page, name = current.name, push = true) {
        current = { type, sec, page, name, view: 'section' };
        lastSectionState = { type, sec, page, name };
        if (push) history.pushState({view: 'section', type, sec, page, name}, '');

        $('home-view').style.display = 'none';
        $('eps-view').style.display = 'none';
        $('section-view').style.display = 'block';
        $('loader').style.display = 'block';
        $('items-grid').innerHTML = '';
        $('pagination-box').innerHTML = '';
        $('section-title').innerText = name;
        closeSidebarOnly();

        try {
            const res = await fetch(`${API}?action=list&type=${encodeURIComponent(type)}&section=${encodeURIComponent(sec)}&page=${encodeURIComponent(page)}`);
            const data = await res.json();
            const items = Array.isArray(data.items) ? data.items : [];
            const grid = $('items-grid');
            items.forEach(item => grid.appendChild(makeCard(item, type)));
            if (!items.length) grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);font-weight:700;">لا توجد عناصر في هذه الصفحة</div>`;
            renderPagination();
        } catch (e) {
            $('items-grid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);font-weight:700;">تعذر جلب البيانات، تأكد من رفع الملف على استضافة HTTPS</div>`;
        } finally {
            $('loader').style.display = 'none';
        }
    }

    function renderPagination() {
        const box = $('pagination-box');
        let html = '';
        if (current.page > 1) html += `<button type="button" class="pag-btn" id="prev-page">السابق</button>`;
        html += `<div class="pag-number">${current.page}</div>`;
        html += `<button type="button" class="pag-btn" id="next-page">التالي</button>`;
        box.innerHTML = html;
        const prev = $('prev-page');
        const next = $('next-page');
        if (prev) prev.addEventListener('click', () => loadData(current.type, current.sec, current.page - 1, current.name));
        if (next) next.addEventListener('click', () => loadData(current.type, current.sec, current.page + 1, current.name));
    }

    async function fetchListPage(sec, page) {
        const res = await fetch(`${API}?action=list&type=${encodeURIComponent(sec.type)}&section=${encodeURIComponent(sec.id)}&page=${page}`);
        const data = await res.json();
        return Array.isArray(data.items) ? data.items : [];
    }

    async function fetchSearchPages(query, token) {
        const wanted = normalizeText(query);
        const matches = [];
        const seen = new Set();
        const MAX_SEARCH_PAGES = 80;

        for (const sec of SEARCH_SECTIONS) {
            for (let page = 1; page <= MAX_SEARCH_PAGES; page++) {
                if (token !== searchToken) return null;
                let items = [];
                try {
                    items = await fetchListPage(sec, page);
                } catch (e) {
                    break;
                }
                if (!items.length) break;

                for (const item of items) {
                    const title = item.title || item.name || '';
                    const key = `${sec.type}-${item.url || title}`;
                    if (seen.has(key)) continue;
                    seen.add(key);
                    if (normalizeText(title).includes(wanted)) {
                        matches.push({...item, type: sec.type, sectionName: sec.name});
                    }
                }
            }
        }
        return matches;
    }

    function runSearch() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(async () => {
            const input = $('user-search');
            const q = input ? input.value.trim() : '';
            const myToken = ++searchToken;

            if (!q) {
                if (lastSectionState) loadData(lastSectionState.type, lastSectionState.sec, lastSectionState.page, lastSectionState.name, false);
                else showHome(false);
                return;
            }

            $('home-view').style.display = 'none';
            $('eps-view').style.display = 'none';
            $('section-view').style.display = 'block';
            $('loader').style.display = 'block';
            $('items-grid').innerHTML = '';
            $('pagination-box').innerHTML = '';
            $('section-title').innerText = `جاري البحث عن: ${q}`;

            const results = await fetchSearchPages(q, myToken);
            if (results === null) return;
            if (myToken !== searchToken) return;
            $('loader').style.display = 'none';
            $('section-title').innerText = `نتائج البحث عن: ${q}`;

            const grid = $('items-grid');
            grid.innerHTML = '';
            if (!results.length) {
                grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);font-weight:700;">لا توجد نتائج لهذا البحث</div>`;
                return;
            }
            results.forEach(item => grid.appendChild(makeCard(item, item.type)));
        }, 500);
    }

    function handleSelection(url, image, type, title) {
        if (!url) return;
        if (type === 'movies') {
            currentPlayUrl = url;
            openPlayer(title);
            fetchAndPlay(url);
        } else {
            loadEpisodes(url, image, title);
        }
    }

    async function loadEpisodes(url, image, title) {
        $('loader').style.display = 'block';
        history.pushState({view: 'eps'}, '');
        try {
            const res = await fetch(`${API}?action=episodes&url=${encodeURIComponent(url)}`);
            const data = await res.json();
            $('section-view').style.display = 'none';
            $('home-view').style.display = 'none';
            $('eps-view').style.display = 'block';
            $('series-title').innerText = title;
            const grid = $('episodes-grid');
            grid.innerHTML = '';
            const episodes = Array.isArray(data) ? data : (data.episodes || []);
            episodes.forEach(ep => {
                const epUrl = ep.url || ep.episode_url || '';
                const epTitle = ep.name || ep.title || 'حلقة';
                const card = document.createElement('div');
                card.className = 'custom-card';
                card.innerHTML = `<div class="card-img" style="background-image: url('${htmlEscape(image)}')"></div><div class="card-play"><i class="fas fa-play"></i></div><div class="card-title">${htmlEscape(epTitle)}</div>`;
                card.addEventListener('click', () => {
                    currentPlayUrl = epUrl;
                    openPlayer(epTitle);
                    fetchAndPlay(currentPlayUrl);
                });
                grid.appendChild(card);
            });
            if (!episodes.length) grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);font-weight:700;">لا توجد حلقات</div>`;
        } catch (e) {
            $('episodes-grid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);font-weight:700;">تعذر جلب الحلقات</div>`;
        } finally {
            $('loader').style.display = 'none';
        }
    }

    function closeEps() {
        if (lastSectionState) loadData(lastSectionState.type, lastSectionState.sec, lastSectionState.page, lastSectionState.name);
        else showHome();
    }

    function openPlayer(title) {
        $('watch-modal').style.display = 'flex';
        $('video-title').innerText = title;
        $('player-loading').style.display = 'flex';
        setActiveServer(1);
        document.body.style.overflow = 'hidden';
        history.pushState({view: 'player'}, '');
    }

    function setActiveServer(serverNumber) {
        const one = $('server-one-btn');
        if (one) one.classList.toggle('active', serverNumber === 1);
    }

    function playServerOne() {
        setActiveServer(1);
        if (currentPlayUrl) fetchAndPlay(currentPlayUrl);
    }

    async function fetchAndPlay(url) {
        $('player-loading').style.display = 'flex';
        try {
            const res = await fetch(`${API}?action=watch&url=${encodeURIComponent(url)}`);
            const data = await res.json();
            if (data.stream) {
                player.source = { type: 'video', sources: [{ src: data.stream, type: 'video/mp4' }] };
                $('dl-link').href = data.stream;
                $('player-loading').style.display = 'none';
                player.play();
            } else {
                $('player-loading').innerHTML = 'تعذر تشغيل الرابط';
            }
        } catch (e) {
            $('player-loading').innerHTML = 'تعذر تشغيل الرابط';
        }
    }

    function closePlayer(pop = true) {
        player.pause();
        $('watch-modal').style.display = 'none';
        player.source = { type: 'video', sources: [] };
        document.body.style.overflow = 'auto';
        if (pop && history.state && history.state.view === 'player') history.back();
    }

    window.onpopstate = function(event) {
        if ($('watch-modal').style.display === 'flex') {
            closePlayer(false);
            return;
        }
        const state = event.state || {view:'home'};
        if (state.view === 'home') showHome(false);
        else if (state.view === 'section') loadData(state.type, state.sec, state.page, state.name, false);
        else if (state.view === 'eps') {
            $('home-view').style.display = 'none';
            $('section-view').style.display = 'none';
            $('eps-view').style.display = 'block';
        }
    };

    window.addEventListener('DOMContentLoaded', initLauncher);
</script>
</body>
</html>
