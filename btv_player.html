<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BTV PLAYER PRO | مولد مشغلات البصري تي في الذكي</title>
<meta name="description" content="الأداة الرسمية لتوليد روابط مشغل البصري تي في (BTV). يدعم فك تشفير السيرفرات، قنوات ياسين تيفي، والأسطورة تيفي لبث المباريات المباشرة بأعلى جودة.">
<meta name="keywords" content="البصري تيفي, البصري تي في, Albasri TV, تطبيق البصري تيفي, ياسين تيفي, Yacine TV, اسطوره تيفي, Ostora TV, بث مباشر, مشغل قنوات, BTV Player, ملفات m3u, كود تفعيل البصري تيفي, تطبيق نقل مباريات">
<meta name="author" content="Romeo - Abu Hussein">

<meta property="og:title" content="BTV PLAYER PRO | المولد الاحترافي">
<meta property="og:description" content="قم بتوليد وتشغيل روابط البث المباشر الخاصة بتطبيق البصري تي في بكل سهولة.">
<meta property="og:image" content="https://up6.cc/2026/04/177672181699171.jpg">

<link rel="icon" type="image/jpg" href="https://up6.cc/2026/04/177672181699171.jpg">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --primary-gradient: linear-gradient(135deg, #00c6ff, #0072ff);
        --accent-gradient: linear-gradient(135deg, #11998e, #38ef7d);
        --danger-color: #ff4b4b;
        --bg-glass: rgba(255, 255, 255, 0.05);
        --border-glass: rgba(255, 255, 255, 0.1);
    }

    body {
        margin: 0;
        font-family: 'Cairo', sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        background-attachment: fixed;
        color: #fff;
        min-height: 100vh;
    }

    .container { max-width: 900px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }

    .top-nav {
        display: flex; justify-content: space-between; align-items: center; padding: 15px 25px;
        background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border-glass); border-radius: 16px; backdrop-filter: blur(15px);
    }
    .logo { font-size: 22px; font-weight: 800; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .card {
        background: var(--bg-glass); border: 1px solid var(--border-glass); border-radius: 20px; padding: 25px;
        backdrop-filter: blur(15px); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    h2 { text-align: center; margin-bottom: 20px; font-size: 20px; color: #00c6ff; }

    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }

    input, select, textarea {
        width: 100%; font-family: 'Cairo', sans-serif; padding: 12px; border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px; background: rgba(0, 0, 0, 0.3); color: #fff; box-sizing: border-box;
    }
    
    .input-wrapper input { padding-right: 40px; }

    input:focus { border-color: #00c6ff; outline: none; background: rgba(0,0,0,0.5); }

    .clear-btn {
        position: absolute;
        left: 10px;
        background: rgba(255, 75, 75, 0.2);
        color: #ff4b4b;
        border: none;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        transition: 0.3s;
        z-index: 5;
    }
    .clear-btn:hover { background: #ff4b4b; color: #fff; }

    .btn {
        padding: 12px 20px; border: none; border-radius: 10px; color: #fff; font-weight: bold;
        cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-add { background: var(--primary-gradient); width: 100%; margin-top: 15px; }
    .btn-update { background: var(--accent-gradient); }

    #serverList { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
    .server-item {
        background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 12px 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center;
        transition: 0.3s;
    }
    .server-item:hover { background: rgba(255, 255, 255, 0.12); transform: translateX(-5px); }
    .server-info { display: flex; flex-direction: column; gap: 2px; }
    .server-info span { font-size: 14px; font-weight: 800; color: #00c6ff; }
    .server-info small { font-size: 11px; color: #aaa; max-width: 250px; overflow: hidden; text-overflow: ellipsis; text-align: left; }

    .actions { display: flex; gap: 10px; }
    .action-btn {
        width: 35px; height: 35px; border-radius: 8px; border: none; cursor: pointer;
        display: flex; align-items: center; justify-content: center; transition: 0.3s; color: #fff;
    }
    .edit-btn { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
    .edit-btn:hover { background: #ffc107; color: #000; }
    .del-btn { background: rgba(255, 75, 75, 0.2); color: #ff4b4b; }
    .del-btn:hover { background: #ff4b4b; color: #fff; }

    @media (max-width: 600px) { .input-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="container">
    <div class="top-nav">
        <div class="logo">BTV PLAYER PRO</div>
        <div style="font-size: 20px;"><i class="fas fa-code-branch"></i></div>
    </div>

    <div class="card">
        <h2><i class="fas fa-unlock-alt"></i> استيراد كود</h2>
        <div style="display:flex; gap:10px;">
            <input type="text" id="encodedInput" placeholder="الصق الكود هنا لفك السيرفرات...">
            <button onclick="decodeAndFill()" class="btn btn-update" style="white-space:nowrap;">فك الضغط</button>
        </div>
    </div>

    <div class="card">
        <h2 id="formTitle"><i class="fas fa-plus-circle"></i> إضافة سيرفر جديد</h2>
        <input type="hidden" id="editIndex" value="-1">
        <div class="input-grid">
            <div class="input-wrapper">
                <input type="text" id="name_server" placeholder="اسم السيرفر" oninput="toggleClear('name_server', 'clr1')">
                <button id="clr1" class="clear-btn" onclick="clearInput('name_server', 'clr1')"><i class="fas fa-times"></i></button>
            </div>
            <div class="input-wrapper">
                <input type="text" id="url_channel" placeholder="رابط القناة (URL)" style="direction:ltr;" oninput="toggleClear('url_channel', 'clr2')">
                <button id="clr2" class="clear-btn" onclick="clearInput('url_channel', 'clr2')"><i class="fas fa-times"></i></button>
            </div>
            <input type="text" id="userAgent" placeholder="User Agent">
            <input type="text" id="referer" placeholder="Referer" style="direction:ltr;">
            <input type="text" id="drm_key" placeholder="Clearkey (DRM)" style="direction:ltr;">
            <input type="text" id="origin" placeholder="Origin" style="direction:ltr;">
            <select id="type_player" style="grid-column: 1 / -1;">
                <option value="bsr_player_exo">EXO Player (أندرويد)</option>
                <option value="bsr_player_web">WEB Player (متصفح)</option>
                <option value="bsr_player_m3u">M3U Playlist</option>
            </select>
        </div>
        <button onclick="saveServer()" id="mainBtn" class="btn btn-add">
            <i class="fas fa-save"></i> إضافة السيرفر للقائمة
        </button>
    </div>

    <div class="card">
        <h2><i class="fas fa-list-ul"></i> السيرفرات المضافة</h2>
        <div id="serverList"></div>
    </div>

    <div class="card">
        <h2><i class="fas fa-terminal"></i> الأكواد الناتجة</h2>
        <div style="display:flex; flex-direction:column; gap:15px;">
            <div>
                <label style="font-size:12px; color:#aaa;">رابط Intent المباشر:</label>
                <textarea id="intentCode" rows="2" readonly style="font-size:12px; direction:ltr;"></textarea>
                <button onclick="copyToClipboard('intentCode')" class="btn btn-add" style="margin-top:5px; padding:8px;"><i class="fas fa-copy"></i> نسخ</button>
            </div>
            <div>
                <label style="font-size:12px; color:#aaa;">كود HTML لزر التشغيل الاحترافي:</label>
                <textarea id="playCode" rows="6" readonly style="font-size:11px; direction:ltr;"></textarea>
                <button onclick="copyToClipboard('playCode')" class="btn btn-add" style="margin-top:5px; padding:8px;"><i class="fas fa-copy"></i> نسخ كود الزر</button>
            </div>
        </div>
    </div>
</div>

<script>
let servers = [];

function toggleClear(inputId, btnId) {
    const val = document.getElementById(inputId).value;
    document.getElementById(btnId).style.display = val.length > 0 ? 'flex' : 'none';
}

function clearInput(inputId, btnId) {
    document.getElementById(inputId).value = '';
    document.getElementById(btnId).style.display = 'none';
    document.getElementById(inputId).focus();
}

function saveServer() {
    const name = document.getElementById('name_server').value;
    const url = document.getElementById('url_channel').value;
    const index = parseInt(document.getElementById('editIndex').value);

    if(!name || !url) { alert("يرجى ملء الاسم والرابط على الأقل!"); return; }

    const serverData = {
        name_server: name,
        url_channel: url,
        userAgent: document.getElementById('userAgent').value,
        referer: document.getElementById('referer').value,
        drm_key: document.getElementById('drm_key').value,
        origin: document.getElementById('origin').value,
        type_player: document.getElementById('type_player').value
    };

    if(index === -1) {
        servers.push(serverData);
    } else {
        servers[index] = serverData;
        document.getElementById('editIndex').value = "-1";
        document.getElementById('mainBtn').innerHTML = '<i class="fas fa-save"></i> إضافة السيرفر للقائمة';
        document.getElementById('formTitle').innerHTML = '<i class="fas fa-plus-circle"></i> إضافة سيرفر جديد';
    }

    renderServers();
    generateCodes();
}

function renderServers() {
    const list = document.getElementById('serverList');
    list.innerHTML = servers.length === 0 ? '<div style="text-align:center; color:#666; font-size:14px;">لا توجد سيرفرات مضافة حالياً</div>' : '';
    
    servers.forEach((s, i) => {
        list.innerHTML += `
            <div class="server-item">
                <div class="server-info">
                    <span>${s.name_server}</span>
                    <small>${s.url_channel}</small>
                </div>
                <div class="actions">
                    <button onclick="editServer(${i})" class="action-btn edit-btn"><i class="fas fa-pen"></i></button>
                    <button onclick="deleteServer(${i})" class="action-btn del-btn"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        `;
    });
}

function editServer(i) {
    const s = servers[i];
    document.getElementById('name_server').value = s.name_server;
    document.getElementById('url_channel').value = s.url_channel;
    document.getElementById('userAgent').value = s.userAgent;
    document.getElementById('referer').value = s.referer;
    document.getElementById('drm_key').value = s.drm_key;
    document.getElementById('origin').value = s.origin;
    document.getElementById('type_player').value = s.type_player;
    
    toggleClear('name_server', 'clr1');
    toggleClear('url_channel', 'clr2');

    document.getElementById('editIndex').value = i;
    document.getElementById('mainBtn').innerHTML = '<i class="fas fa-check-circle"></i> حفظ التعديلات';
    document.getElementById('formTitle').innerHTML = '<i class="fas fa-edit"></i> تعديل السيرفر الآن';
    window.scrollTo({ top: 200, behavior: 'smooth' });
}

function deleteServer(i) {
    servers.splice(i, 1);
    renderServers();
    generateCodes();
}

function generateCodes() {
    if(servers.length === 0) {
        document.getElementById('intentCode').value = '';
        document.getElementById('playCode').value = '';
        return;
    }

    const prefix = servers[0].type_player;
    const jsonString = JSON.stringify(servers);
    const encoded = btoa(unescape(encodeURIComponent(jsonString)));
    const finalCode = prefix + encoded;
    const intent = `intent://${finalCode}#Intent;scheme=xmtv;package=com.btv.video.player;end`;
    
    document.getElementById('intentCode').value = intent;
    
    const fullHtml = `<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body,html{margin:0;padding:0;height:100%;width:100%;display:flex;justify-content:center;align-items:center;overflow:hidden;background-color:#050509;font-family:sans-serif;}
.bg{position:absolute;width:100%;height:100%;background:radial-gradient(circle,rgba(0,210,255,0.1) 0%,rgba(5,5,9,1) 80%);animation:p 8s infinite alternate;z-index:1;}
@keyframes p{0%{transform:scale(1);opacity:0.5;}100%{transform:scale(1.2);opacity:1;}}
.play-btn{position:relative;z-index:10;width:120px;height:120px;border:2px solid #00d2ff;border-radius:50%;display:flex;justify-content:center;align-items:center;cursor:pointer;transition:0.4s;background:transparent;}
.play-btn:hover{transform:scale(1.1);border-color:#fff;box-shadow:0 0 30px #00d2ff;}
.play-btn::after{content:'';width:0;height:0;border-top:18px solid transparent;border-bottom:18px solid transparent;border-left:28px solid #00d2ff;margin-left:8px;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);display:none;justify-content:center;align-items:center;z-index:100;}
.modal-c{background:#1e1e2f;padding:30px;border-radius:20px;text-align:center;border:1px solid #00d2ff;max-width:280px;color:#fff;}
.d-btn{display:inline-block;padding:12px 25px;background:linear-gradient(90deg,#00d2ff,#0072ff);color:#fff;text-decoration:none;border-radius:50px;font-weight:bold;margin-top:20px;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="play-btn" onclick="launch()"></div>
<div id="m" class="modal"><div class="modal-c"><h3>المشغل غير مثبت!</h3><p>يرجى تحميل المشغل الرسمي للمتابعة.</p><a href="https://play.google.com/store/apps/details?id=com.btv.video.player" class="d-btn">تحميل الآن</a></div></div>
<script>
function launch(){
    const start = Date.now();
    window.location.href = "${intent}";
    setTimeout(function(){ if(Date.now()-start < 1500) document.getElementById('m').style.display='flex'; },1000);
}
<\/script>
</body>
</html>`;

    document.getElementById('playCode').value = fullHtml;
}

function decodeAndFill() {
    const input = document.getElementById('encodedInput').value;
    const prefixes = ['bsr_player_web', 'bsr_player_m3u', 'bsr_player_exo', 'com.btv.video.player'];
    const prefix = prefixes.find(p => input.startsWith(p));
    
    if(!prefix) { alert("الكود غير صحيح!"); return; }
    
    try {
        const base64 = input.replace(prefix, '');
        servers = JSON.parse(decodeURIComponent(escape(atob(base64))));
        renderServers();
        generateCodes();
        alert("تم استيراد " + servers.length + " سيرفر بنجاح!");
    } catch(e) {
        alert("خطأ في فك التشفير!");
    }
}

function copyToClipboard(id) {
    const copyText = document.getElementById(id);
    copyText.select();
    document.execCommand("copy");
    alert("تم النسخ!");
}
</script>
</body>
</html>
