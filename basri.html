  }

  function normalizeServers(m){
    const s = m.servers || m.qualities || [];
    if(Array.isArray(s)) return s.filter(function(x){ return x && x.url; });
    if(typeof s === "object") return Object.values(s).filter(function(x){ return x && x.url; });

  function toEnglishDigits(str){
    return String(str || "")
      .replace(/[٠-٩]/g, function(d){ return "٠١٢٣٤٥٦٧٨٩".indexOf(d); })
      .replace(/[۰-۹]/g, function(d){ return "۰۱۲۳۴۵۶۷۸۹".indexOf(d); });

  function format12Hour(timeValue, dateValue){
    if(!timeValue) return "";
    let raw = toEnglishDigits(String(timeValue)).trim();
    let d = dateValue ? new Date(dateValue + "T" + raw) : null;

    if(!d || isNaN(d.getTime())) d = new Date("2000-01-01T" + raw);

    if(isNaN(d.getTime())){
      const m = raw.match(/(\d{1,2}):(\d{2})/);

      let h = parseInt(m[1], 10);
      const min = m[2];
      const suffix = h >= 12 ? "م" : "ص";
      h = h % 12;
      if(h === 0) h = 12;
      return h + ":" + min + " " + suffix;
    }

    let h = d.getHours();
    const min = String(d.getMinutes()).padStart(2, "0");
    const suffix = h >= 12 ? "م" : "ص";
    h = h % 12;
    if(h === 0) h = 12;
    return h + ":" + min + " " + suffix;
  }

  function getStatus(m){
    const s = Number(m.status !== undefined ? m.status : (m.match_status || 0));
    const txt = String(m.status_text || m.statusText || "");

    if(txt.includes("انتهت") || s === 4){
      return {text:"انتهت", cls:"end", order:3, showScore:true};
    }

    if(txt.includes("جارية") || txt.includes("مباشر") || [1,2,3].includes(s)){
      return {text:"جارية الآن", cls:"live", order:1, showScore:true};
    }

    const d = m.match_date || m.date || "";
    const t = m.match_time || m.time || "";

    if(d && t){
      const mt = new Date(d + "T" + toEnglishDigits(t));
      if(!isNaN(mt.getTime()) && Date.now() >= mt.getTime()){
        return {text:"جارية الآن", cls:"live", order:1, showScore:true};
      }
    }

    return {text:"لم تبدأ", cls:"soon", order:2, showScore:false};
  }

  function getScore(m){
    return safe(m.home_scores, safe(m.homeScore, "0")) + " - " + safe(m.away_scores, safe(m.awayScore, "0"));

  function buildProxyUrl(src){
    const params = new URLSearchParams();
    params.set("url", src.url || "");

    if(src.userAgent) params.set("ua", src.userAgent);
    if(src.referer) params.set("ref", src.referer);
    if(src.origin) params.set("origin", src.origin);

    if(String(src.url || "").toLowerCase().includes("#hls")){
      params.set("type", "hls");
    }

    params.set("_", Date.now().toString());
    return WORKER_BASE + "?" + params.toString();
  }

  function shouldUseWorker(src){
    const url = String(src.url || "").toLowerCase();

    if(src._forceWorker) return true;
    if(src.userAgent || src.referer || src.origin) return true;
    if(url.includes("#hls")) return true;
    if(url.includes(".mpd") && src.drmKey) return true;

    return false;
  }

  function getPlayUrl(src){
    if(shouldUseWorker(src)) return buildProxyUrl(src);
    return src.url;
  }

  function parseClearKey(ckString){
    if(!ckString) return null;

    const parts = ckString.split(":");
    if(parts.length !== 2) return null;

    return {
      kid: parts[0].trim().replace(/-/g, "").toLowerCase(),
      key: parts[1].trim().replace(/-/g, "").toLowerCase()
    };
  }

  async function playServer(i, isRetry){
    const src = currentServers[i];

    if(!src || !src.url){
      showError("لا يوجد سيرفر", "لا يوجد رابط لهذه المباراة.");
      return;
    }

    if(!isRetry){
      directFallbackTried = false;
    }

    currentIndex = i;
    buildServerButtons();

    suppressVideoError = true;
    destroyPlayer();

    setTimeout(function(){
      suppressVideoError = false;
    }, 1000);

    hideError();
    loading.style.display = "block";

    const finalUrl = getPlayUrl(src);

    try{
      shaka.polyfill.installAll();

      if(!shaka.Player.isBrowserSupported()){
        throw new Error("المتصفح لا يدعم Shaka Player");
      }

      shakaPlayer = new shaka.Player(video);

      shakaPlayer.configure({
        streaming:{
          bufferingGoal:45,
          rebufferingGoal:2,
          bufferBehind:30,
          retryParameters:{
            timeout:30000,
            maxAttempts:8,
            baseDelay:1000,
            backoffFactor:2,
            fuzzFactor:0.5
          }
        },
        manifest:{
          retryParameters:{
            timeout:30000,
            maxAttempts:8,
            baseDelay:1000,
            backoffFactor:2,
            fuzzFactor:0.5
          }
        }
      });

      const engine = shakaPlayer.getNetworkingEngine();
      if(engine){
        engine.registerRequestFilter(function(type, request){
          if(src.userAgent) request.headers["User-Agent"] = src.userAgent;
          if(src.referer) request.headers["Referer"] = src.referer;
          if(src.origin) request.headers["Origin"] = src.origin;
        });
      }

      const ck = parseClearKey(src.drmKey || "");
      if(ck){
        shakaPlayer.configure({
          drm:{
            clearKeys:{
              [ck.kid]:ck.key
            }
          }
        });
      }

      shakaPlayer.addEventListener("error", function(event){
        console.log("Shaka Error:", event.detail);

        if(!shouldUseWorker(currentServers[currentIndex]) && !directFallbackTried){
          directFallbackTried = true;
          currentServers[currentIndex]._forceWorker = true;
          toastMsg("تجربة التشغيل عبر Worker...");
          setTimeout(function(){
            playServer(currentIndex, true);
          }, 1000);
          return;
        }

        toastMsg("جاري محاولة متابعة البث...");
      });

      await shakaPlayer.load(finalUrl);

      video.addEventListener("canplay", function(){
        video.play().catch(function(){});
      }, {once:true});

      await video.play().catch(function(){});

      loading.style.display = "none";
      video.playbackRate = currentSpeed;
      buildQualityMenu();
      buildSubsMenu();
      buildAudioMenu();
      buildSpeedMenu();
      setPlayIcon();
      showPlayerControls();

    }catch(e){
      loading.style.display = "none";

      if(!shouldUseWorker(src) && !directFallbackTried){
        directFallbackTried = true;
        src._forceWorker = true;
        toastMsg("تجربة التشغيل عبر Worker...");
        setTimeout(function(){
          playServer(currentIndex, true);
        }, 1000);
        return;
      }

      showError("فشل التشغيل", e.message || "تعذر تشغيل هذا السيرفر، جرّب سيرفر آخر.");
    }
  }

  function fmt(sec){
    if(!isFinite(sec) || sec < 0) return "00:00";

    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60).toString().padStart(2, "0");
    const s = Math.floor(sec % 60).toString().padStart(2, "0");

    return h ? String(h).padStart(2, "0") + ":" + m + ":" + s : m + ":" + s;
  }

  document.addEventListener("keydown", function(e){
    const k = (e.key || "").toLowerCase();

    if(
      e.key === "F12" ||
      (e.ctrlKey && k === "u") ||
      (e.ctrlKey && e.shiftKey && ["i","j","c"].includes(k))
    ){
      e.preventDefault();
      return false;
    }
  });
});
</script>
</body>
</html>
