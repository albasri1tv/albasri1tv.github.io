<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>البصري تيفي | ALBASRI TV</title>
    
    <link rel="icon" type="image/jpg" href="https://up6.cc/2026/04/177672181699171.jpg">
    
    <meta name="description" content="حمل الآن تطبيق البصري تي في (ALBASRI TV) لمشاهدة أقوى المحتويات الرياضية والتقنية. المنصة الرسمية للمطور علي يعقوب (روميو).">
    <meta name="keywords" content="البصري تي في, ALBASRI TV, تحميل تطبيق البصري, تطبيق Basri Pro, مشغل BSR Player, روميو, بث مباشر">
    <meta name="author" content="Romeo">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #030712;
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.3s ease; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            background: radial-gradient(circle at center, #0b214d 0%, #030712 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-card {
            width: 100%;
            max-width: 800px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .brand-logo {
            width: 120px;
            height: 120px;
            border-radius: 25px;
            margin-bottom: 15px;
            border: 2px solid var(--primary);
            padding: 5px;
            background: #000;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            object-fit: cover;
        }

        h1 { font-size: clamp(24px, 5vw, 32px); font-weight: 900; margin-bottom: 10px; color: var(--primary); text-shadow: 0 2px 10px rgba(0,210,255,0.3); }
        .tagline { color: var(--text-dim); margin-bottom: 30px; font-size: 16px; }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }
        .preview-grid img {
            width: 100%;
            aspect-ratio: 9/16;
            object-fit: cover;
            border-radius: 15px;
            border: 1px solid var(--border);
            cursor: pointer;
        }
        .preview-grid img:hover { transform: scale(1.05); border-color: var(--primary); }

        .actions-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 16px;
        }

        .btn-main { background: linear-gradient(135deg, var(--secondary), var(--primary)); color: #fff; box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2); }
        .btn-sub { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.2); }

        .services-section {
            background: rgba(0,0,0,0.2);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .nav-item {
            text-decoration: none;
            color: #fff;
            padding: 8px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            font-size: 13px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .nav-item:hover { background: var(--primary); color: #000; }

        .downloader-box {
            margin-top: 30px;
            padding: 20px;
            border: 1px dashed var(--primary);
            border-radius: 20px;
        }
        .code-display {
            font-size: 35px;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 5px;
            cursor: pointer;
            display: block;
            margin: 10px 0;
        }

        footer { margin-top: 40px; font-size: 12px; color: var(--text-dim); border-top: 1px solid var(--border); padding-top: 20px; }

        @media (max-width: 480px) {
            .main-card { padding: 25px 15px; }
            .preview-grid { gap: 8px; }
        }
    </style>
</head>
<body>

<div class="main-card">
    <img src="https://up6.cc/2026/04/177610707754814.jpg" alt="Logo" class="brand-logo">
    
    <h1>البصري تيفي ALBASRI TV</h1>
    <p class="tagline">المنصة الرسمية لتحميل تطبيقات البصري و BSR Player</p>

    <div class="preview-grid">
        <img src="https://up6.cc/2026/04/177610707742171.jpg" alt="Screen 1">
        <img src="https://up6.cc/2026/04/177610707751573.jpg" alt="Screen 2">
        <img src="https://up6.cc/2026/04/177610707748052.jpg" alt="Screen 3">
    </div>

    <div class="actions-group">
        <a href="https://www.mediafire.com/file/aqv1m6qldnd3k7h/ALBASRI+TV.apk/file" class="btn btn-main">
            <i class="fab fa-android"></i> تحميل التطبيق (APK)
        </a>
        <a href="https://play.google.com/store/apps/details?id=com.btv.video.player&hl=ar" class="btn btn-sub">
            <i class="fab fa-google-play"></i> تحميل المشغل
        </a>
    </div>

    <div class="services-section">
        <p style="font-size: 14px; font-weight: bold; color: var(--primary);">خدماتنا الإضافية</p>
        <div class="nav-links">
            <a href="albasti4u.html" class="nav-item"><i class="fas fa-link"></i> رابط بديل</a>
            <a href="Basri_Pro_Player.html" class="nav-item"><i class="fas fa-star"></i> Basri Pro</a>
            <a href="bsr_player.html" class="nav-item"><i class="fas fa-play-circle"></i> BTV Web</a>
        </div>

        <div class="downloader-box">
            <p style="font-size: 12px; color: var(--text-dim);">كود تطبيق Downloader للشاشات الذكية</p>
            <span class="code-display" id="copyCode" onclick="copyText()">1962664</span>
            <p id="msg" style="font-size: 11px; color: var(--primary);">اضغط على الكود للنسخ</p>
        </div>
    </div>

    <footer>
        تطوير وبرمجة: علي يعقوب (ROMEO) &copy; 2026
    </footer>
</div>

<script>
    function copyText() {
        const code = document.getElementById('copyCode').innerText;
        navigator.clipboard.writeText(code).then(() => {
            const msg = document.getElementById('msg');
            msg.innerText = "تم النسخ بنجاح!";
            msg.style.color = "#4ade80";
            setTimeout(() => {
                msg.innerText = "اضغط على الكود للنسخ";
                msg.style.color = "#00d2ff";
            }, 2000);
        });
    }
</script>

</body>
</html>
