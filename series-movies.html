<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>مسلسلات وافلام البصري تيفي </title>
    <meta name="description" content="استمتع بمشاهدة أحدث المسلسلات العربية، التركية، الأجنبية، والأفلام الحصرية بجودة عالية على البصري تي في VIP. منصتكم الأولى للترفيه المجاني.">
    <meta name="keywords" content="البصري تي في, albasri tv, مسلسلات عربية, مسلسلات تركية, افلام اجنبية, مشاهدة مسلسلات, تحميل افلام, مسلسلات رمضان 2026, سينما لايف">
    <meta name="author" content="علي البصري">
    <link rel="canonical" href="https://aliss199734-lang.github.io/albasri.tv/">

    <meta property="og:title" content="البصري تي في VIP - عالم المسلسلات والأفلام">
    <meta property="og:description" content="شاهد أفلامك ومسلسلاتك المفضلة بجودة عالية وسيرفرات سريعة.">
    <meta property="og:image" content="https://up6.cc/2026/04/177578061698531.png">
    <meta property="og:url" content="https://aliss199734-lang.github.io/albasri.tv/">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --main: #ff0040; 
            --main-dark: #cc0033;
            --bg: #09090b; 
            --card: #141417; 
            --text: #ffffff; 
            --plyr-color-main: var(--main); 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }

        header { 
            background: rgba(9, 9, 11, 0.85); 
            position: sticky; top: 0; z-index: 1001; 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.5);
            padding: 15px 0;
            transition: 0.3s;
        }
        .header-content { 
            max-width: 1200px; margin: auto; padding: 0 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            flex-wrap: wrap; gap: 15px;
        }
        .logo { 
            font-size: 22px; font-weight: 900; color: var(--text); 
            cursor: pointer; line-height: 1.1; display: flex; flex-direction: column;
        }
        .logo span { 
            background: linear-gradient(45deg, var(--main), #ff6680);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 14px; font-weight: 700; letter-spacing: 1px; 
        }

        .search-box { 
            position: relative; display: none; flex: 1; max-width: 400px; 
            animation: fadeIn 0.5s ease;
        }
        .search-box input { 
            width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 12px 45px 12px 20px; border-radius: 30px; color: rgba(255, 255, 255, 0.8);
            font-family: 'Cairo'; font-size: 14px; outline: none; transition: 0.3s;
        }
        .search-box input:focus { 
            border-color: var(--main); 
            background: rgba(255, 0, 64, 0.08); 
            box-shadow: 0 0 10px rgba(255, 0, 64, 0.4); 
            color: white;
        }
        .search-box i { 
            position: absolute; right: 18px; top: 50%; transform: translateY(-50%); 
            color: rgba(255, 255, 255, 0.5); font-size: 16px; transition: 0.3s;
        }
        .search-box input:focus + i { color: var(--main); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 18px; }
        @media (max-width: 600px) { 
            .header-content { justify-content: center; flex-direction: column; }
            .content-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; } 
            .search-box { width: 100%; max-width: 100%; }
        }

        .custom-card { 
            background: var(--card); border-radius: 20px; height: 220px; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end; 
            cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            border: 1px solid rgba(255,255,255,0.03); 
            position: relative; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .custom-card:hover { transform: translateY(-8px); border-color: var(--main); box-shadow: 0 15px 30px rgba(255,0,64,0.3); }
        .card-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: brightness(0.6); transition: 0.4s; }
        .custom-card:hover .card-img { filter: brightness(0.4) scale(1.05); }
        
        .card-play {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            z-index: 4; width: 65px; height: 65px; border-radius: 50%;
            background-color: rgba(255, 0, 64, 0.8); display: flex;
            justify-content: center; align-items: center; color: white;
            font-size: 26px; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; box-shadow: 0 0 20px rgba(255, 0, 64, 0.6);
        }
        .custom-card:hover .card-play { transform: translate(-50%, -50%) scale(1); opacity: 1; }

        .card-title {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 3; font-weight: 700; padding: 0 10px; width: 90%;
            text-align: center; font-size: 14px; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            color: var(--text); transition: 0.3s;
        }
        .custom-card:hover .card-title { opacity: 0.2; transform: translate(-50%, -50%) scale(0.9); }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 10px; margin: 35px 0; }
        .pag-btn { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 10px 22px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.3s; }
        .pag-btn:hover { background: var(--main); border-color: var(--main); transform: translateY(-2px); }
        .pag-number { background: linear-gradient(45deg, var(--main-dark), var(--main)); color: #fff; padding: 10px 20px; border-radius: 12px; font-weight: 900; box-shadow: 0 5px 15px rgba(255,0,64,0.3); }

        #watch-page { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; backdrop-filter: blur(10px);
        }
        .watch-header { height: 70px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .player-container { 
            max-width: 900px; width: 95%; margin: 25px auto; border-radius: 20px; 
            overflow: hidden; position: relative; background: #000; aspect-ratio: 16/9; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1);
        }
        #player-loading { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; gap: 15px; align-items: center; justify-content: center; z-index: 10; color: var(--main); }
        .action-bar { max-width: 900px; margin: auto; padding: 0 15px; }
        .download-btn { 
            display: flex; align-items: center; justify-content: center; gap: 10px; 
            background: linear-gradient(45deg, var(--main-dark), var(--main)); 
            color: #fff; padding: 16px; border-radius: 15px; text-decoration: none; 
            font-weight: 700; margin-bottom: 30px; transition: 0.3s; box-shadow: 0 10px 25px rgba(255,0,64,0.3);
        }
        .btn-back { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 10px 22px; border-radius: 12px; cursor: pointer; margin-bottom: 25px; font-weight: bold; transition: 0.3s; }
        .loader-main { text-align: center; padding: 80px; color: var(--main); font-size: 35px; }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <div class="logo" onclick="showHome()">
            مسلسلات وأفلام
            <span>البصري تي في</span>
        </div>
        <div class="search-box" id="search-bar">
            <input type="text" id="user-search" placeholder="ابحث عن فيلم أو مسلسل..." onkeyup="runSearch()">
            <i class="fas fa-search"></i>
        </div>
    </div>
</header>

<div class="container">
    <div id="loader" class="loader-main" style="display:none;"><i class="fas fa-circle-notch fa-spin"></i></div>
    <div id="home-view" class="content-grid"></div>
    <div id="section-view" style="display:none;">
        <button class="btn-back" onclick="showHome()"><i class="fas fa-arrow-right"></i> العودة للرئيسية</button>
        <div id="items-grid" class="content-grid"></div>
        <div id="pagination-box" class="pagination"></div>
    </div>
    <div id="eps-view" style="display:none;">
        <button class="btn-back" onclick="closeEps()"><i class="fas fa-arrow-right"></i> رجوع للقسم</button>
        <div id="episodes-grid" class="content-grid"></div>
    </div>
</div>

<div id="watch-page">
    <div class="watch-header">
        <div onclick="closePlayer()" style="cursor:pointer; width:40px; height:40px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.1); border-radius:50%;"><i class="fas fa-times"></i></div>
        <div style="flex:1; text-align:center; font-weight:700; font-size:16px; color:#fff;" id="video-title">جاري التشغيل...</div>
    </div>
    <div class="player-container">
        <div id="player-loading"><i class="fas fa-spinner fa-spin fa-2x"></i><span>تجهيز السيرفر...</span></div>
        <video id="player" playsinline controls><source src="" type="video/mp4" /></video>
    </div>
    <div class="action-bar">
        <a id="dl-link" href="#" target="_blank" class="download-btn"><i class="fas fa-cloud-download-alt"></i> تحميل الجودة الأصلية</a>
    </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script>
    const player = new Plyr('#player', { controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'] });
    const API = "https://seres.albasriali1990.workers.dev/";
    let current = { type: '', sec: '', page: 1 };

    const sectionImages = {
        series_29: "https://up6.cc/2026/04/177578061698531.png", series_32: "https://up6.cc/2026/04/177578061707422.png",
        series_30: "https://up6.cc/2026/04/177578066558531.png", series_31: "https://up6.cc/2026/04/1775780864911.png",
        series_33: "https://up6.cc/2026/04/177578091128861.png", movies_29: "https://up6.cc/2026/04/177578141485251.png",
        movies_30: "https://up6.cc/2026/04/177578141491472.png", movies_32: "https://up6.cc/2026/04/17757814150724.png",
        movies_31: "https://up6.cc/2026/04/177578141497723.png", movies_33: "https://up6.cc/2026/04/177578152800671.png"
    };

    function initLauncher() {
        const cats = [
            {id:'29', type:'series', name:'مسلسلات عربية', img:sectionImages.series_29}, {id:'32', type:'series', name:'مسلسلات تركية', img:sectionImages.series_32},
            {id:'30', type:'series', name:'مسلسلات أجنبية', img:sectionImages.series_30}, {id:'31', type:'series', name:'مسلسلات هندية', img:sectionImages.series_31},
            {id:'33', type:'series', name:'مسلسلات آسيوية', img:sectionImages.series_33}, {id:'29', type:'movies', name:'أفلام عربية', img:sectionImages.movies_29},
            {id:'30', type:'movies', name:'أفلام أجنبية', img:sectionImages.movies_30}, {id:'32', type:'movies', name:'أفلام تركية', img:sectionImages.movies_32},
            {id:'31', type:'movies', name:'أفلام هندية', img:sectionImages.movies_31}, {id:'33', type:'movies', name:'أفلام آسيوية', img:sectionImages.movies_33}
        ];
        cats.forEach(c => {
            document.getElementById('home-view').innerHTML += `
            <div class="custom-card" onclick="loadData('${c.type}', '${c.id}', 1)">
                <div class="card-img" style="background-image: url('${c.img}')"></div>
                <div class="card-play"><i class="fas fa-play"></i></div> <div class="card-title">${c.name}</div>
            </div>`;
        });
    }
    initLauncher();

    function showHome() { 
        document.getElementById('home-view').style.display = 'grid'; 
        document.getElementById('section-view').style.display = 'none'; 
        document.getElementById('eps-view').style.display = 'none'; 
        document.getElementById('search-bar').style.display = 'none'; 
        window.scrollTo({ top: 0, behavior: 'smooth' }); 
    }

    function loadData(type, sec, page) {
        current = { type, sec, page };
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('section-view').style.display = 'block';
        document.getElementById('search-bar').style.display = 'flex';
        document.getElementById('loader').style.display = 'block';
        document.getElementById('items-grid').innerHTML = '';
        window.scrollTo(0,0);
        fetch(`${API}?action=list&type=${type}&section=${sec}&page=${page}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById('loader').style.display = 'none';
            data.items.forEach(item => {
                document.getElementById('items-grid').innerHTML += `
                <div class="custom-card movie-item" data-title="${item.title}" onclick="handleSelection('${item.url}', '${item.image}', '${type}', '${item.title}')">
                    <div class="card-img" style="background-image: url('${item.image}')"></div>
                    <div class="card-play"><i class="fas fa-play"></i></div> <div class="card-title">${item.title}</div>
                </div>`;
            });
            renderPagination();
        });
    }

    function runSearch() {
        let query = document.getElementById('user-search').value.toLowerCase();
        let items = document.getElementsByClassName('movie-item');
        for (let item of items) {
            let title = item.getAttribute('data-title').toLowerCase();
            item.style.display = title.includes(query) ? "flex" : "none";
        }
    }

    function renderPagination() {
        const box = document.getElementById('pagination-box');
        box.innerHTML = '';
        if (current.page > 1) box.innerHTML += `<button class="pag-btn" onclick="loadData('${current.type}', '${current.sec}', ${current.page - 1})">السابق</button>`;
        box.innerHTML += `<div class="pag-number">${current.page}</div>`;
        box.innerHTML += `<button class="pag-btn" onclick="loadData('${current.type}', '${current.sec}', ${current.page + 1})">التالي</button>`;
    }

    function handleSelection(url, image, type, title) {
        if (type === 'movies') { openWatchPage(title); fetchAndPlay(url); } 
        else { loadEpisodes(url, image); }
    }

    function openWatchPage(title) {
        document.getElementById('watch-page').style.display = 'block';
        document.getElementById('video-title').innerText = title;
        document.getElementById('player-loading').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function fetchAndPlay(url) {
        fetch(`${API}?action=watch&url=${encodeURIComponent(url)}`)
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success' && data.stream) {
                player.source = { type: 'video', sources: [{ src: data.stream, type: 'video/mp4' }] };
                player.play();
                document.getElementById('dl-link').href = data.stream;
                document.getElementById('player-loading').style.display = 'none';
            }
        });
    }

    function loadEpisodes(url, image) {
        document.getElementById('loader').style.display = 'block';
        fetch(`${API}?action=episodes&url=${encodeURIComponent(url)}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('section-view').style.display = 'none';
            document.getElementById('eps-view').style.display = 'block';
            document.getElementById('search-bar').style.display = 'none';
            const grid = document.getElementById('episodes-grid');
            grid.innerHTML = '';
            data.forEach(ep => {
                grid.innerHTML += `
                <div class="custom-card" onclick="openWatchPage('${ep.name}'); fetchAndPlay('${ep.url}');">
                    <div class="card-img" style="background-image: url('${image}')"></div>
                    <div class="card-play"><i class="fas fa-play"></i></div> <div class="card-title">${ep.name}</div>
                </div>`;
            });
            window.scrollTo(0,0);
        });
    }

    function closeEps() { document.getElementById('eps-view').style.display = 'none'; document.getElementById('section-view').style.display = 'block'; document.getElementById('search-bar').style.display = 'flex'; }
    function closePlayer() { 
        player.pause(); 
        document.getElementById('watch-page').style.display = 'none'; 
        document.body.style.overflow = 'auto'; 
        player.source = { type: 'video', sources: [] }; 
    }
</script>
</body>
</html>
